<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CallLock Speed Dialer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid #262626;
      background: #111;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats {
      display: flex;
      gap: 20px;
      font-size: 13px;
      color: #a3a3a3;
    }

    .stats span { color: #fff; font-weight: 600; }

    .scoreboard-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 24px;
      border-bottom: 1px solid #1f2937;
      background: linear-gradient(90deg, #161d10 0%, #111827 100%);
      font-size: 13px;
      color: #d1d5db;
    }

    .scoreboard-text strong { color: #fff; font-weight: 700; }

    .scoreboard-refresh {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #374151;
      background: #111827;
      color: #93c5fd;
      font-size: 12px;
      cursor: pointer;
    }

    .scoreboard-refresh:hover { border-color: #4b5563; }

    .session-header {
      display: none;
      align-items: stretch;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 24px;
      border-bottom: 1px solid #1f2937;
      background: linear-gradient(90deg, #101820 0%, #111827 100%);
      flex-wrap: wrap;
    }

    .session-header.visible { display: flex; }

    .session-header-main {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-width: 320px;
    }

    .session-header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .session-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .session-badge.am { background: #14532d; color: #4ade80; }
    .session-badge.mid { background: #1e3a5f; color: #60a5fa; }
    .session-badge.eod { background: #78350f; color: #fbbf24; }
    .session-badge.break { background: #262626; color: #d4d4d4; }
    .session-badge.segment { background: #2d1b69; color: #c4b5fd; }

    .session-composition {
      font-size: 13px;
      color: #d1d5db;
    }

    .session-header-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 13px;
    }

    .session-instruction {
      color: #a3a3a3;
      font-style: italic;
    }

    .session-countdown {
      color: #fbbf24;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .session-banner {
      display: none;
      padding: 10px 24px;
      border-bottom: 1px solid #5b3a00;
      background: #2a1f00;
      color: #fbbf24;
      font-size: 13px;
    }

    .session-banner.visible { display: block; }

    .twilio-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .twilio-badge.ready { background: #1e3a5f; color: #60a5fa; }
    .twilio-badge.connecting { background: #78350f; color: #fbbf24; }
    .twilio-badge.error { background: #7f1d1d; color: #fca5a5; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      gap: 32px;
    }

    .lead-card {
      background: #171717;
      border: 1px solid #262626;
      border-radius: 16px;
      padding: 40px 48px;
      width: 100%;
      max-width: 640px;
      text-align: center;
    }

    .lead-number {
      font-size: 12px;
      color: #737373;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    .lead-company {
      font-size: 30px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .lead-phone {
      font-size: 36px;
      font-weight: 700;
      color: #22c55e;
      letter-spacing: 1px;
      margin-bottom: 12px;
      font-variant-numeric: tabular-nums;
    }

    .lead-address {
      font-size: 13px;
      color: #737373;
      margin-bottom: 12px;
    }

    .lead-meta {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
      color: #a3a3a3;
      margin-bottom: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #111827;
      border: 1px solid #1f2937;
    }

    .badge.score { color: #93c5fd; }
    .badge.tier { color: #fbbf24; text-transform: uppercase; }
    .badge.metro { color: #c4b5fd; }

    .signal-summary {
      margin-top: 12px;
      padding: 14px 16px;
      border: 1px solid #262626;
      border-radius: 12px;
      background: #111;
      font-size: 14px;
      color: #d4d4d4;
    }

    .call-hook {
      margin-top: 12px;
      padding: 14px 16px;
      border: 1px solid #163127;
      border-radius: 12px;
      background: #0d1b14;
      color: #bbf7d0;
      font-size: 14px;
      line-height: 1.5;
    }

    .call-hook strong { color: #86efac; }

    .dial-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      background: #22c55e;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dial-btn:hover { background: #16a34a; transform: scale(1.05); }
    .dial-btn:active { transform: scale(0.95); }
    .dial-btn.dialing { background: #ef4444; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 16px rgba(239, 68, 68, 0); }
    }

    .dial-hint {
      font-size: 12px;
      color: #525252;
      margin-top: 8px;
    }

    .call-status {
      font-size: 13px;
      color: #a3a3a3;
      margin-top: 4px;
      min-height: 18px;
    }

    .call-timer {
      font-size: 20px;
      color: #fbbf24;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      display: none;
      margin-top: 4px;
    }

    .recording-indicator {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #ef4444;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .recording-indicator .rec-dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse-rec 1.5s infinite;
    }

    @keyframes pulse-rec {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .shortcuts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 640px;
    }

    .shortcut {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #171717;
      border: 1px solid #262626;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.1s;
      user-select: none;
    }

    .shortcut:hover { border-color: #404040; background: #1f1f1f; }
    .shortcut:active { transform: scale(0.97); }

    .shortcut kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 5px;
      background: #262626;
      border-radius: 4px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      color: #d4d4d4;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #171717;
      border: 1px solid #262626;
      border-radius: 16px;
      padding: 32px;
      width: 440px;
      max-width: 90vw;
    }

    .modal h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .modal textarea {
      width: 100%;
      height: 120px;
      background: #0a0a0a;
      border: 1px solid #262626;
      border-radius: 8px;
      color: #e5e5e5;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      margin-bottom: 16px;
    }

    .modal textarea:focus { outline: none; border-color: #404040; }

    .modal label {
      display: block;
      font-size: 12px;
      color: #a3a3a3;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .modal input[type="date"] {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #262626;
      border-radius: 8px;
      color: #e5e5e5;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .modal input[type="date"]:focus { outline: none; border-color: #404040; }

    .modal-field.hidden { display: none; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .modal-actions button {
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid #262626;
      background: #171717;
      color: #e5e5e5;
      font-size: 13px;
      cursor: pointer;
    }

    .modal-actions button.primary {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 12px 24px;
      background: #262626;
      border: 1px solid #404040;
      border-radius: 8px;
      font-size: 14px;
      z-index: 200;
      transition: transform 0.2s;
    }

    .toast.visible { transform: translateX(-50%) translateY(0); }

    .empty-state {
      text-align: center;
      color: #525252;
      padding: 60px;
    }

    .empty-state h2 { font-size: 24px; margin-bottom: 12px; color: #737373; }
    .empty-state p { font-size: 14px; margin-bottom: 24px; }

    /* Tab navigation */
    .tab-nav {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #262626;
      background: #111;
      padding: 0 24px;
    }
    .tab-btn {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: #737373;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: #a3a3a3; }
    .tab-btn.active { color: #fff; border-bottom-color: #22c55e; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Today's Plan styles */
    .plan-container { padding: 24px; max-width: 800px; }
    .plan-header { margin-bottom: 20px; }
    .plan-header h2 { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .plan-header p { font-size: 13px; color: #737373; }
    .plan-block { margin-bottom: 24px; }
    .plan-block-title {
      font-size: 14px; font-weight: 600; color: #22c55e;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 8px; padding-bottom: 4px;
      border-bottom: 1px solid #1a1a1a;
    }
    .plan-sprint {
      display: flex; align-items: baseline; gap: 12px;
      padding: 8px 0; border-bottom: 1px solid #1a1a1a;
      font-size: 13px;
    }
    .plan-sprint:last-child { border-bottom: none; }
    .plan-time { color: #737373; min-width: 60px; font-variant-numeric: tabular-nums; }
    .plan-metro { color: #3b82f6; font-weight: 600; min-width: 60px; }
    .plan-count { color: #a3a3a3; min-width: 70px; }
    .plan-note { color: #525252; font-style: italic; }
    .plan-callbacks { margin-bottom: 20px; }
    .plan-callbacks h3 { font-size: 14px; color: #eab308; margin-bottom: 8px; }
    .plan-callback-item {
      display: flex; gap: 16px; padding: 8px 12px;
      background: #171717; border-radius: 6px; margin-bottom: 6px;
      font-size: 13px; align-items: center;
    }
    .plan-callback-name { color: #fff; font-weight: 500; min-width: 180px; }
    .plan-callback-phone { color: #22c55e; }
    .plan-callback-metro { color: #737373; }
    .plan-fallback {
      text-align: center; color: #eab308; padding: 16px;
      background: #1a1700; border-radius: 8px; margin-bottom: 16px;
      font-size: 13px;
    }
    .plan-summary {
      display: flex; gap: 24px; padding: 12px 0;
      border-top: 1px solid #262626; margin-top: 12px;
      font-size: 13px; color: #a3a3a3;
    }
    .plan-summary span { color: #fff; font-weight: 600; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@twilio/voice-sdk@2/dist/twilio.min.js"></script>
  <!-- Deepgram: using raw WebSocket (not SDK) for audio capture -->
</head>
<body>
  <header>
    <h1>
      CallLock Speed Dialer
      <span class="twilio-badge connecting" id="twilio-badge">Connecting...</span>
    </h1>
    <div class="stats">
      <div>Dialed: <span id="stat-dialed">0</span></div>
      <div>Remaining: <span id="stat-remaining">0</span></div>
      <div>Interested: <span id="stat-interested">0</span></div>
      <div>Demos: <span id="stat-demos">0</span></div>
    </div>
  </header>

  <div class="scoreboard-banner">
    <div class="scoreboard-text" id="scoreboard-text">Loading scoreboard...</div>
    <button class="scoreboard-refresh" id="scoreboard-refresh" onclick="refreshScoreboard()">Refresh</button>
  </div>

  <div class="session-header" id="session-header"></div>
  <div class="session-banner" id="session-banner"></div>

  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('dial')">Speed Dial</button>
    <button class="tab-btn" onclick="switchTab('plan')">Today's Plan</button>
  </nav>

  <div id="tab-dial" class="tab-content active">
    <main id="main-content">
      <div class="empty-state" id="empty-state">
        <h2>Loading ranked prospects</h2>
        <p>Fetching call-ready leads from Supabase.</p>
      </div>
    </main>
  </div>

  <div id="tab-plan" class="tab-content">
    <div class="plan-container" id="plan-content">
      <div class="empty-state">
        <h2>Loading today's plan...</h2>
        <p>Fetching sprint schedule from harness.</p>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Notes</h2>
      <div class="modal-field hidden" id="modal-callback-field">
        <label for="modal-callback-date">Callback date</label>
        <input id="modal-callback-date" type="date" />
      </div>
      <textarea id="modal-notes" placeholder="Add notes about this lead..."></textarea>
      <div class="modal-actions">
        <button onclick="closeModal()">Cancel</button>
        <button class="primary" onclick="submitModal()">Save & Next</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let leads = [];
    let currentIndex = 0;
    let isDialing = false;
    let modalOutcome = null;
    let twilioDevice = null;
    let activeCall = null;
    let lastCallSid = null;
    let lastDialStartedId = null;
    let callStartTime = null;
    let callTimerInterval = null;
    let sessionRestored = false;
    let queueContext = null;
    let queueCountdownInterval = null;

    const CALL_SERVER = window.location.origin;
    const stats = { dialed: 0, interested: 0, demos: 0 };
    const log = [];
    const queueParams = new URLSearchParams(window.location.search);

    function currentQueueRequest() {
      const block = (queueParams.get('block') || '').toUpperCase();
      const segment = queueParams.get('segment') || '';
      return block ? { block, segment } : null;
    }

    function queueCacheKey(block, date) {
      return `lastQueue-${block}-${date}`;
    }

    function formatEtTime(value) {
      if (!value) return '';
      try {
        return new Date(value).toLocaleTimeString('en-US', {
          timeZone: 'America/Detroit',
          hour: 'numeric',
          minute: '2-digit',
        });
      } catch {
        return value;
      }
    }

    function queueCountdownText(state, stale = false) {
      if (!state) return '—';
      if (!state.block_active && state.next_block) {
        return `Next: ${state.next_block} at ${formatEtTime(state.next_block_at)} ET${stale ? ' (stale)' : ''}`;
      }
      if (!state.next_segment_at || !state.next_segment_name) {
        return stale ? 'Last known queue (stale)' : 'Queue live';
      }
      const minutes = Math.max(Math.floor((new Date(state.next_segment_at).getTime() - Date.now()) / 60000), 0);
      return `Next: ${state.next_segment_name} at ${formatEtTime(state.next_segment_at)} ET (${minutes} min)${stale ? ' (stale)' : ''}`;
    }

    function renderSessionBanner(message = '') {
      const banner = document.getElementById('session-banner');
      if (!banner) return;
      if (!message) {
        banner.classList.remove('visible');
        banner.textContent = '';
        return;
      }
      banner.textContent = message;
      banner.classList.add('visible');
    }

    function renderSessionHeader() {
      const header = document.getElementById('session-header');
      if (!header) return;
      if (queueCountdownInterval) {
        clearInterval(queueCountdownInterval);
        queueCountdownInterval = null;
      }

      if (!queueContext || !currentQueueRequest()) {
        header.classList.remove('visible');
        header.innerHTML = '';
        renderSessionBanner('');
        return;
      }

      const { state, queue, stale, cachedAt } = queueContext;
      const block = state?.block_active ? (state.current_block || queue.block || 'AM') : 'BREAK';
      const blockClass = String(block).toLowerCase();
      const segment = state?.active_segment || queue.segment || '—';
      const composition = queue?.summary || '0 callbacks, 0 interested, 0 follow-up, 0 fresh';
      const instruction = state?.instruction || (stale ? 'Showing last known queue.' : '');
      const dialProgress = `${state?.dials_completed_today || 0}/${state?.dials_target_today || 0} dials`;
      const countdown = queueCountdownText(state, stale);

      header.innerHTML = `
        <div class="session-header-main">
          <div class="session-header-top">
            <span class="session-badge ${escapeHtml(blockClass)}">${escapeHtml(block)}${state?.sprint_index ? ` Sprint ${escapeHtml(String(state.sprint_index))}` : ''}</span>
            ${segment ? `<span class="session-badge segment">${escapeHtml(segment)}</span>` : ''}
            <span class="session-composition">${escapeHtml(composition)}</span>
            <span class="session-composition">${escapeHtml(dialProgress)}</span>
          </div>
          <div class="session-header-bottom">
            <span class="session-instruction">${escapeHtml(instruction)}</span>
            <span class="session-countdown" id="session-countdown">${escapeHtml(countdown)}</span>
          </div>
        </div>
        <button class="scoreboard-refresh" id="queue-refresh" onclick="refreshQueue()">⟳ Refresh Queue</button>
      `;
      header.classList.add('visible');

      if (stale && cachedAt) {
        const ageMinutes = Math.max(Math.floor((Date.now() - cachedAt) / 60000), 0);
        renderSessionBanner(`Using cached queue from ${ageMinutes} min ago. Harness may be down.`);
      } else {
        renderSessionBanner('');
      }

      if (state?.next_segment_at || state?.next_block_at) {
        queueCountdownInterval = setInterval(() => {
          const countdownEl = document.getElementById('session-countdown');
          if (countdownEl && queueContext) {
            countdownEl.textContent = queueCountdownText(queueContext.state, queueContext.stale);
          }
        }, 60000);
      }
    }

    function showEmptyState(title, message) {
      document.getElementById('main-content').innerHTML = `
        <div class="empty-state">
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(message)}</p>
        </div>
      `;
    }

    function writeQueueCache(block, payload) {
      const cacheDate = payload?.state?.date || new Date().toISOString().slice(0, 10);
      try {
        localStorage.setItem(queueCacheKey(block, cacheDate), JSON.stringify({
          cachedAt: Date.now(),
          payload,
        }));
      } catch (error) {
        console.warn('[dialer] queue cache skipped:', error.message);
      }
    }

    function readQueueCache(block) {
      const prefix = `lastQueue-${block}-`;
      for (let i = 0; i < localStorage.length; i += 1) {
        const key = localStorage.key(i);
        if (!key || !key.startsWith(prefix)) continue;
        try {
          const parsed = JSON.parse(localStorage.getItem(key));
          if (parsed?.payload) return parsed;
        } catch {}
      }
      return null;
    }

    async function initTwilioDevice() {
      updateTwilioBadge('connecting');
      try {
        const response = await fetch(`${CALL_SERVER}/token`);
        if (!response.ok) throw new Error(`Token fetch failed: ${response.status}`);
        const { token } = await response.json();

        twilioDevice = new Twilio.Device(token, {
          codecPreferences: ['opus', 'pcmu'],
          edge: 'ashburn',
        });

        twilioDevice.on('registered', () => updateTwilioBadge('ready'));
        twilioDevice.on('unregistered', () => updateTwilioBadge('connecting'));
        twilioDevice.on('error', (error) => {
          console.error('[twilio] Device error:', error);
          updateTwilioBadge('error');
          showToast(`Twilio error: ${error.message}`);
        });
        twilioDevice.on('tokenWillExpire', async () => {
          const tokenResponse = await fetch(`${CALL_SERVER}/token`);
          const { token: nextToken } = await tokenResponse.json();
          twilioDevice.updateToken(nextToken);
        });

        await twilioDevice.register();
      } catch (error) {
        console.error('[twilio] init failed:', error);
        updateTwilioBadge('error');
      }
    }

    function updateTwilioBadge(state) {
      const badge = document.getElementById('twilio-badge');
      badge.className = `twilio-badge ${state}`;
      badge.textContent = state === 'ready' ? 'Voice Ready' : state === 'connecting' ? 'Connecting...' : 'Voice Error';
    }

          <div class="shortcut" onclick="logOutcome('not_interested')"><kbd>3</kbd> Not Interested</div>

          <div class="shortcut" onclick="logOutcome('callback')"><kbd>C</kbd> Callback</div>

    function updateStats() {
      document.getElementById('stat-dialed').textContent = stats.dialed;
      document.getElementById('stat-remaining').textContent = Math.max(0, leads.length - currentIndex);
      document.getElementById('stat-interested').textContent = stats.interested;
      document.getElementById('stat-demos').textContent = stats.demos;
    }

    function renderScoreboard(metrics) {
      const text = document.getElementById('scoreboard-text');
      if (!text) return;
      if (!metrics || metrics.error) {
        text.textContent = 'Scoreboard unavailable.';
        return;
      }

      const daily = Number(metrics.daily_dials || 0);
      const target = Number(metrics.daily_target || 0);
      const pct = target > 0 ? Math.round((daily / target) * 100) : 0;
      const dayNumber = Number(metrics.day_number || 0);
      const connectRate = Number(metrics.connect_rate || 0).toFixed(1);
      const demos = Number(metrics.demos_booked_today || 0);
      text.textContent = `Day ${dayNumber} | ${daily}/${target} dials (${pct}%) | Connect: ${connectRate}% | Demos: ${demos}`;
    }

    let _scoreboardTimer = null;
    function refreshScoreboard() {
      // Debounce: at most one refresh per 10 seconds
      if (_scoreboardTimer) return;
      _scoreboardTimer = setTimeout(() => { _scoreboardTimer = null; }, 10000);
      _refreshScoreboardNow();
    }
    async function _refreshScoreboardNow() {
      const button = document.getElementById('scoreboard-refresh');
      if (button) button.disabled = true;
      try {
        const response = await fetch(`${CALL_SERVER}/scoreboard`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        renderScoreboard(payload);
      } catch (error) {
        console.error('[dialer] scoreboard failed:', error);
        renderScoreboard({ error: error.message });
      } finally {
        if (button) button.disabled = false;
      }
    }

    function formatPhone(phone) {
      const digits = phone.replace(/\D/g, '');
      if (digits.length === 11 && digits[0] === '1') {
        return `(${digits.slice(1, 4)}) ${digits.slice(4, 7)}-${digits.slice(7)}`;
      }
      if (digits.length === 10) {
        return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
      }
      return phone;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function safeExternalUrl(value) {
      if (!value) return null;
      const candidate = /^[a-z]+:\/\//i.test(value) ? value : `https://${value}`;
      try {
        const url = new URL(candidate);
        return url.protocol === 'https:' || url.protocol === 'http:' ? url.toString() : null;
      } catch {
        return null;
      }
    }

    function updateCallStatus(text) {
      const element = document.getElementById('call-status');
      if (element) element.textContent = text;
    }

    function startCallTimer() {
      const timerEl = document.getElementById('call-timer');
      const recEl = document.getElementById('recording-indicator');
      if (timerEl) timerEl.style.display = 'block';
      if (recEl) recEl.style.display = 'flex';

      callTimerInterval = setInterval(() => {
        if (!callStartTime) return;
        const elapsed = Math.round((Date.now() - callStartTime) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        if (timerEl) timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
      }, 1000);
    }

    function stopCallTimer() {
      clearInterval(callTimerInterval);
      callTimerInterval = null;
      const recEl = document.getElementById('recording-indicator');
      if (recEl) recEl.style.display = 'none';
    }

    async function toggleDial() {
      if (currentIndex >= leads.length) return;
      const lead = leads[currentIndex];
      const button = document.getElementById('dial-btn');

      if (!isDialing) {
        if (!twilioDevice) {
          showToast('Twilio not ready');
          return;
        }

        try {
          // Fire-and-forget: don't block the call on dial-started logging
          fetch(`${CALL_SERVER}/dial-started`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prospect_id: lead.id }),
          }).then(r => r.ok ? r.json() : null).then(p => {
            if (p) lastDialStartedId = p.id || null;
          }).catch(() => {});

          activeCall = await twilioDevice.connect({ params: { To: lead.phone, ProspectState: lead.metro || '' } });
          button.classList.add('dialing');
          isDialing = true;
          stats.dialed += 1;
          updateStats();
          refreshScoreboard();
          updateCallStatus('Connecting...');

          activeCall.on('ringing', () => updateCallStatus('Ringing...'));
          activeCall.on('accept', () => {
            callStartTime = Date.now();
            lastCallSid = activeCall.parameters.CallSid;
            updateCallStatus('Connected');
            startCallTimer();
            // Sales HUD: notify HUD page + start audio capture
            hudOnCallAccept();
          });
          activeCall.on('disconnect', () => {
            const duration = callStartTime ? Math.round((Date.now() - callStartTime) / 1000) : 0;
            updateCallStatus(`Ended (${duration}s)`);
            stopCallTimer();
            // Sales HUD: notify HUD page + stop audio capture
            hudOnCallDisconnect();
            button.classList.remove('dialing');
            isDialing = false;
            activeCall = null;
            callStartTime = null;
          });
          activeCall.on('error', (error) => {
            console.error('[twilio] call error:', error);
            stopCallTimer();
            // Sales HUD: clean up audio + notify HUD on error path too
            hudOnCallDisconnect();
            button.classList.remove('dialing');
            isDialing = false;
            activeCall = null;
            updateCallStatus('');
            showToast(`Call error: ${error.message}`);
          });
        } catch (error) {
          showToast(`Failed to connect: ${error.message}`);
        }
      } else if (activeCall) {
        activeCall.disconnect();
      }
    }

    function sendCallMetadata(lead, outcome, notes, callbackDate = '') {
      if (!lastCallSid) return;
      fetch(`${CALL_SERVER}/calls/${lastCallSid}/metadata`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prospectId: lead.id,
          businessName: lead.business_name,
          outcome,
          notes,
          callbackDate: callbackDate || null,
          callHookUsed: lead.call_hook,
        }),
      }).catch((error) => console.error('[call-server] metadata failed:', error));
    }

    function logOutcome(outcome) {
      if (currentIndex >= leads.length) return;
      if (outcome === 'interested' || outcome === 'demo' || outcome === 'callback') {
        modalOutcome = outcome;
        document.getElementById('modal-title').textContent =
          outcome === 'interested'
            ? 'Interested — Add Notes'
            : outcome === 'demo'
              ? 'Demo Scheduled — Add Notes'
              : 'Callback — Add Notes';
        document.getElementById('modal-notes').value = '';
        document.getElementById('modal-callback-date').value = '';
        document.getElementById('modal-callback-field').classList.toggle('hidden', outcome !== 'callback');
        document.getElementById('modal-overlay').classList.add('active');
        setTimeout(() => document.getElementById('modal-notes').focus(), 100);
        return;
      }
      saveOutcome(outcome, '', '');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
      document.getElementById('modal-callback-field').classList.add('hidden');
      modalOutcome = null;
    }

    function submitModal() {
      const notes = document.getElementById('modal-notes').value;
      const callbackDate = document.getElementById('modal-callback-date').value;
      document.getElementById('modal-overlay').classList.remove('active');
      document.getElementById('modal-callback-field').classList.add('hidden');
      saveOutcome(modalOutcome, notes, callbackDate);
      modalOutcome = null;
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2500);
    }

    function saveOutcome(outcome, notes, callbackDate = '') {
      const lead = leads[currentIndex];
      log.push({
        timestamp: new Date().toISOString(),
        index: currentIndex,
        company: lead.business_name,
        phone: lead.phone,
        outcome,
        notes,
        callbackDate,
      });
      // Sales HUD: forward outcome to HUD page
      hudChannel.postMessage({
        type: 'OUTCOME',
        callSid: lastCallSid,
        seq: hudNextSeq(),
        outcome,
        notes,
        atMs: Date.now(),
      });

      if (outcome === 'callback') stats.interested += 1;
      if (outcome === 'interested') stats.interested += 1;
      if (outcome === 'demo') {
        stats.interested += 1;
        stats.demos += 1;
      }

      const labels = {
        no_answer: 'No Answer',
        voicemail: 'Voicemail Left',
        not_interested: 'Not Interested',
        wrong_number: 'Wrong Number',
        callback: 'Callback Scheduled',
        interested: 'Interested',
        demo: 'Demo Scheduled',
      };
      showToast(labels[outcome] || outcome);

      if (activeCall) activeCall.disconnect();
      isDialing = false;
      updateCallStatus('');
      localStorage.setItem('calllock-log', JSON.stringify(log));
      sendCallMetadata(lead, outcome, notes, callbackDate);
      lastCallSid = null;
      lastDialStartedId = null;
      currentIndex += 1;
      localStorage.setItem('calllock-index', currentIndex);
      renderLead();
      refreshScoreboard();
    }

    function restoreSession(preserveIndex = true) {
      if (sessionRestored) return;
      sessionRestored = true;
      const savedIndex = localStorage.getItem('calllock-index');
      if (preserveIndex && savedIndex) currentIndex = parseInt(savedIndex, 10);

      const savedLog = localStorage.getItem('calllock-log');
      if (savedLog) {
        const parsed = JSON.parse(savedLog);
        log.push(...parsed);
        parsed.forEach((entry) => {
          stats.dialed += 1;
          if (entry.outcome === 'interested' || entry.outcome === 'callback') stats.interested += 1;
          if (entry.outcome === 'demo') {
            stats.interested += 1;
            stats.demos += 1;
          }
        });
      }
    }

    async function loadDefaultLeads() {
      try {
        showEmptyState('Loading ranked prospects', 'Fetching call-ready leads from Supabase.');
        const response = await fetch(`${CALL_SERVER}/prospects`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        leads = payload.prospects || [];
        if (leads.length === 0) {
          showEmptyState('No call-ready prospects', 'Score and probe leads first, then reload the dialer.');
          return;
        }
        restoreSession(true);
        renderLead();
      } catch (error) {
        console.error('[dialer] load failed:', error);
        showEmptyState('Could not load prospects', error.message);
      }
    }

    async function loadQueueLeads({ block, segment }, { allowCache = true } = {}) {
      try {
        queueContext = {
          state: { current_block: block, active_segment: segment, instruction: 'Loading queue...' },
          queue: { block, segment, summary: 'Loading queue...' },
          stale: false,
        };
        renderSessionHeader();

        const params = new URLSearchParams({ block, exclude_dialed: 'true' });
        if (segment) params.set('segment', segment);
        const response = await fetch(`${CALL_SERVER}/current-queue?${params.toString()}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();

        leads = payload?.queue?.prospects || [];
        queueContext = { state: payload.state || {}, queue: payload.queue || {}, stale: false, cachedAt: Date.now() };
        writeQueueCache(block, payload);
        currentIndex = 0;
        restoreSession(false);
        renderSessionHeader();

        if (leads.length === 0) {
          showEmptyState(`0 leads for ${segment || block}`, 'Harness returned an empty queue for this block.');
          return true;
        }
        renderLead();
        return true;
      } catch (error) {
        console.error('[dialer] queue load failed:', error);
        if (!allowCache) throw error;

        const cached = readQueueCache(block);
        if (cached?.payload) {
          leads = cached.payload?.queue?.prospects || [];
          queueContext = {
            state: cached.payload.state || {},
            queue: cached.payload.queue || {},
            stale: true,
            cachedAt: cached.cachedAt || Date.now(),
          };
          currentIndex = 0;
          restoreSession(false);
          renderSessionHeader();
          if (leads.length === 0) {
            showEmptyState(`0 leads for ${segment || block}`, 'Using cached queue but no leads were available.');
          } else {
            renderLead();
          }
          return true;
        }
        return false;
      }
    }

    async function refreshQueue() {
      const request = currentQueueRequest();
      if (!request) return;
      const button = document.getElementById('queue-refresh');
      if (button) button.disabled = true;
      try {
        await loadQueueLeads(request, { allowCache: false });
      } catch (error) {
        showToast(`Refresh failed: ${error.message}`);
      } finally {
        if (button) button.disabled = false;
      }
    }

    async function loadLeads() {
      const request = currentQueueRequest();
      if (!request) {
        queueContext = null;
        renderSessionHeader();
        return loadDefaultLeads();
      }
      const loaded = await loadQueueLeads(request);
      if (!loaded) {
        queueContext = null;
        renderSessionHeader();
        showEmptyState('Could not load queue', 'Falling back to default ranked prospects.');
        await loadDefaultLeads();
      }
    }

    document.addEventListener('keydown', (event) => {
      const modalOpen = document.getElementById('modal-overlay').classList.contains('active');
      if (event.key === 'Escape' && modalOpen) {
        closeModal();
        return;
      }
      if (event.key === 'Enter' && modalOpen) {
        submitModal();
        return;
      }
      if (modalOpen) return;
      if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;

      switch (event.key) {
        case ' ':
          event.preventDefault();
          toggleDial();
          break;
        case '1':
          logOutcome('no_answer');
          break;
        case '2':
          logOutcome('voicemail');
          break;
        case '3':
          logOutcome('not_interested');
          break;
        case '4':
          logOutcome('wrong_number');
          break;
        case 'c':
        case 'C':
          logOutcome('callback');
          break;
        case 'i':
        case 'I':
          logOutcome('interested');
          break;
        case 'd':
        case 'D':
          logOutcome('demo');
          break;
      }
    });

    // Tab switching
    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(`tab-${tabId}`).classList.add('active');
      const selector = tabId === 'dial' ? 0 : 1;
      document.querySelectorAll('.tab-btn')[selector].classList.add('active');
      if (tabId === 'plan') loadPlan();
    }

    // Today's Plan
    let planLoaded = false;

    async function loadPlan() {
      const container = document.getElementById('plan-content');
      try {
        const response = await fetch(`${CALL_SERVER}/daily-plan`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const plan = await response.json();
        planLoaded = true;
        renderPlan(plan, container);
      } catch (error) {
        container.textContent = '';
        const errDiv = document.createElement('div');
        errDiv.className = 'empty-state';
        const h2 = document.createElement('h2');
        h2.textContent = 'Could not load plan';
        const p = document.createElement('p');
        p.textContent = error.message;
        errDiv.appendChild(h2);
        errDiv.appendChild(p);
        container.appendChild(errDiv);
      }
    }

    function renderPlan(plan, container) {
      container.textContent = '';

      // Header
      const header = document.createElement('div');
      header.className = 'plan-header';
      const h2 = document.createElement('h2');
      h2.textContent = `Week ${plan.week || '?'} ${plan.day_of_week ? '\u2014 ' + plan.day_of_week : ''} ${plan.date || ''}`;
      header.appendChild(h2);
      if (plan.message) {
        const p = document.createElement('p');
        p.textContent = plan.message;
        header.appendChild(p);
        container.appendChild(header);
        return;
      }
      container.appendChild(header);

      // Fallback warning
      if (plan.fallback) {
        const warn = document.createElement('div');
        warn.className = 'plan-fallback';
        warn.textContent = 'Harness unavailable. Showing default ranked list.';
        container.appendChild(warn);
      }

      // Callbacks section
      const callbacks = plan.callbacks || [];
      if (callbacks.length > 0) {
        const cbSection = document.createElement('div');
        cbSection.className = 'plan-callbacks';
        const cbTitle = document.createElement('h3');
        cbTitle.textContent = `Callbacks Due (${callbacks.length})`;
        cbSection.appendChild(cbTitle);
        for (const cb of callbacks) {
          const item = document.createElement('div');
          item.className = 'plan-callback-item';
          const name = document.createElement('span');
          name.className = 'plan-callback-name';
          name.textContent = cb.business_name || '';
          const phone = document.createElement('span');
          phone.className = 'plan-callback-phone';
          phone.textContent = formatPhone(cb.phone || cb.phone_normalized || '');
          const metro = document.createElement('span');
          metro.className = 'plan-callback-metro';
          metro.textContent = cb.metro || '';
          item.appendChild(name);
          item.appendChild(phone);
          item.appendChild(metro);
          if (cb.notes) {
            const note = document.createElement('span');
            note.className = 'plan-note';
            note.textContent = cb.notes;
            item.appendChild(note);
          }
          cbSection.appendChild(item);
        }
        container.appendChild(cbSection);
      }

      // Sprint blocks
      const blocks = plan.blocks || [];
      for (const block of blocks) {
        const blockDiv = document.createElement('div');
        blockDiv.className = 'plan-block';
        const blockTitle = document.createElement('div');
        blockTitle.className = 'plan-block-title';
        blockTitle.textContent = `${block.block} Block \u2014 ${block.start_et} ET`;
        blockDiv.appendChild(blockTitle);
        for (const sprint of (block.sprints || [])) {
          const row = document.createElement('div');
          row.className = 'plan-sprint';
          const time = document.createElement('span');
          time.className = 'plan-time';
          time.textContent = sprint.start_et || '';
          const metroSpan = document.createElement('span');
          metroSpan.className = 'plan-metro';
          metroSpan.textContent = (sprint.metro || '').toUpperCase();
          const count = document.createElement('span');
          count.className = 'plan-count';
          count.textContent = `${sprint.lead_count || 0} leads`;
          row.appendChild(time);
          row.appendChild(metroSpan);
          row.appendChild(count);
          if (sprint.note) {
            const note = document.createElement('span');
            note.className = 'plan-note';
            note.textContent = sprint.note;
            row.appendChild(note);
          }
          blockDiv.appendChild(row);
        }
        container.appendChild(blockDiv);
      }

      // Summary
      const totalSprints = plan.total_sprints || 0;
      const totalDials = totalSprints * (plan.dials_per_sprint || 10);
      const summary = document.createElement('div');
      summary.className = 'plan-summary';
      for (const [label, value] of [['Sprints', totalSprints], ['Target Dials', totalDials], ['Callbacks', callbacks.length], ['Fresh Leads', plan.total_fresh || 0]]) {
        const div = document.createElement('div');
        div.textContent = `${label}: `;
        const span = document.createElement('span');
        span.textContent = String(value);
        div.appendChild(span);
        summary.appendChild(div);
      }
      container.appendChild(summary);
    }

    // ── Sales HUD: Audio Capture + BroadcastChannel Bridge ──────────
    // Architecture: Dialer page owns audio capture. HUD page (separate tab)
    // receives transcript events via BroadcastChannel. See plan for details.

    const hudChannel = new BroadcastChannel('calllock-hud');
    let hudSeq = 0;
    let hudDualStream = false;
    let hudRemoteStream = null;
    let hudRepDgConn = null;
    let hudProspectDgConn = null;
    let hudHeartbeatInterval = null;
    let hudDeepgramKey = null;

    // Monotonic utterance counter for stale-event rejection
    function hudNextSeq() { return ++hudSeq; }

    // Simple UUID for utterance IDs
    function hudUuid() {
      return 'xxxxxxxx-xxxx-4xxx'.replace(/x/g, () =>
        ((Math.random() * 16) | 0).toString(16)
      );
    }

    // ── RTCPeerConnection monkey-patch ──────────────────────────────
    // Must run BEFORE Twilio Device init. Captures the remote audio
    // track from Twilio's internal WebRTC connection.
    const OriginalRTCPC = window.RTCPeerConnection;
    window.RTCPeerConnection = function(...args) {
      const pc = new OriginalRTCPC(...args);
      pc.addEventListener('track', (event) => {
        if (event.track.kind === 'audio' && !hudRemoteStream) {
          console.log('[hud-audio] Captured remote audio track from WebRTC');
          hudRemoteStream = new MediaStream([event.track]);
          // If Deepgram is ready, start prospect channel
          if (hudDeepgramKey && !hudProspectDgConn) {
            startProspectChannel();
          }
        }
      });
      return pc;
    };
    Object.setPrototypeOf(window.RTCPeerConnection, OriginalRTCPC);
    Object.setPrototypeOf(window.RTCPeerConnection.prototype, OriginalRTCPC.prototype);

    // ── Deepgram connection helpers ─────────────────────────────────
    async function fetchDeepgramKey() {
      try {
        const resp = await fetch(`${CALL_SERVER}/hud/deepgram-token`, {
          credentials: 'same-origin',
        });
        if (!resp.ok) throw new Error(`Token fetch ${resp.status}`);
        const data = await resp.json();
        hudDeepgramKey = data.key;
        return data.key;
      } catch (e) {
        console.error('[hud-audio] Failed to fetch Deepgram key:', e.message);
        return null;
      }
    }

    function createDgConnection(key, speaker) {
      // Use Deepgram's WebSocket directly (SDK may not bundle browser dist)
      const params = new URLSearchParams({
        model: 'nova-2',
        interim_results: 'true',
        endpointing: '300',
        vad_events: 'true',
        encoding: 'linear16',
        sample_rate: '16000',
        channels: '1',
      });
      const ws = new WebSocket(`wss://api.deepgram.com/v1/listen?${params}`, ['token', key]);

      ws.onopen = () => console.log(`[hud-audio] Deepgram ${speaker} channel open`);
      ws.onclose = (e) => {
        console.log(`[hud-audio] Deepgram ${speaker} channel closed: ${e.code}`);
        // Auto-reconnect if call is still active
        if (isDialing && hudDeepgramKey) {
          console.log(`[hud-audio] Reconnecting ${speaker} channel in 2s...`);
          setTimeout(() => {
            if (isDialing) {
              if (speaker === 'rep') startRepChannel();
              else if (speaker === 'prospect' && hudRemoteStream) startProspectChannel();
            }
          }, 2000);
        }
      };
      ws.onerror = (e) => console.error(`[hud-audio] Deepgram ${speaker} error:`, e);

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'Results' && data.channel) {
            const alt = data.channel.alternatives[0];
            if (alt && alt.transcript) {
              hudChannel.postMessage({
                type: 'TRANSCRIPT',
                callSid: lastCallSid,
                utteranceId: hudUuid(),
                seq: hudNextSeq(),
                speaker,
                text: alt.transcript,
                isFinal: data.is_final,
                confidence: alt.confidence || 0,
                atMs: Date.now(),
              });
            }
          }
        } catch (e) {
          // Ignore non-JSON messages (keepalives, metadata)
        }
      };

      return ws;
    }

    // Audio capture via AudioContext + ScriptProcessor (simpler than AudioWorklet for this use case)
    function captureStreamToWs(mediaStream, ws) {
      const ctx = new AudioContext({ sampleRate: 16000 });
      const source = ctx.createMediaStreamSource(mediaStream);
      // ScriptProcessorNode: 4096 buffer, 1 input channel, 1 output channel
      const processor = ctx.createScriptProcessor(4096, 1, 1);

      processor.onaudioprocess = (e) => {
        if (ws.readyState !== WebSocket.OPEN) return;
        const float32 = e.inputBuffer.getChannelData(0);
        // Convert Float32 to Linear16 (Int16)
        const int16 = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
          const s = Math.max(-1, Math.min(1, float32[i]));
          int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        ws.send(int16.buffer);
      };

      source.connect(processor);
      // Do NOT connect to ctx.destination — that would play audio back through speakers
      // causing echo/feedback. ScriptProcessor needs a connection to stay alive, use a
      // silent GainNode instead.
      const silentGain = ctx.createGain();
      silentGain.gain.value = 0;
      processor.connect(silentGain);
      silentGain.connect(ctx.destination);

      return { ctx, source, processor, mediaStream };
    }

    let repAudioPipeline = null;
    let prospectAudioPipeline = null;

    async function startRepChannel() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const ws = createDgConnection(hudDeepgramKey, 'rep');
        // Wait for WS to open before sending audio
        await new Promise((resolve, reject) => {
          ws.addEventListener('open', resolve, { once: true });
          ws.addEventListener('error', reject, { once: true });
          setTimeout(reject, 5000);
        });
        repAudioPipeline = captureStreamToWs(stream, ws);
        hudRepDgConn = ws;
        console.log('[hud-audio] Rep channel active');
      } catch (e) {
        console.error('[hud-audio] Rep channel failed:', e.message);
      }
    }

    function startProspectChannel() {
      if (!hudRemoteStream || !hudDeepgramKey) return;
      try {
        const ws = createDgConnection(hudDeepgramKey, 'prospect');
        ws.addEventListener('open', () => {
          prospectAudioPipeline = captureStreamToWs(hudRemoteStream, ws);
          hudProspectDgConn = ws;
          hudDualStream = true;
          hudChannel.postMessage({ type: 'AUDIO_MODE', mode: 'dual' });
          console.log('[hud-audio] Prospect channel active (dual stream)');
        }, { once: true });
      } catch (e) {
        console.error('[hud-audio] Prospect channel failed:', e.message);
      }
    }

    function stopAudioCapture() {
      if (repAudioPipeline) {
        repAudioPipeline.mediaStream.getTracks().forEach((track) => track.stop());
        repAudioPipeline.processor.disconnect();
        repAudioPipeline.source.disconnect();
        repAudioPipeline.ctx.close().catch(() => {});
        repAudioPipeline = null;
      }
      if (prospectAudioPipeline) {
        prospectAudioPipeline.mediaStream.getTracks().forEach((track) => track.stop());
        prospectAudioPipeline.processor.disconnect();
        prospectAudioPipeline.source.disconnect();
        prospectAudioPipeline.ctx.close().catch(() => {});
        prospectAudioPipeline = null;
      }
      if (hudRepDgConn && hudRepDgConn.readyState === WebSocket.OPEN) {
        hudRepDgConn.close();
      }
      if (hudProspectDgConn && hudProspectDgConn.readyState === WebSocket.OPEN) {
        hudProspectDgConn.close();
      }
      hudRepDgConn = null;
      hudProspectDgConn = null;
      hudRemoteStream = null;
      hudDualStream = false;
      hudSeq = 0;
    }

    // ── BroadcastChannel call lifecycle events ──────────────────────
    // Injected into existing call lifecycle (toggleDial, logOutcome, disconnect)
    const origToggleDial = toggleDial;

    // Wrap the existing toggleDial to add HUD events
    // We override toggleDial after it's defined above
    const originalAcceptHandler = null; // We'll patch via call events instead

    // Patch: on call accept, start audio capture + post CALL_STARTED
    function hudOnCallAccept() {
      const lead = leads[currentIndex];
      hudChannel.postMessage({
        type: 'CALL_STARTED',
        callSid: lastCallSid,
        seq: hudNextSeq(),
        prospectId: lead?.id,
        prospectName: lead?.business_name,
        businessName: lead?.business_name,
        metro: lead?.metro,
        signals: lead?.signal_details || [],
      });
      // Start heartbeat so HUD can detect dialer tab death
      if (hudHeartbeatInterval) clearInterval(hudHeartbeatInterval);
      hudHeartbeatInterval = setInterval(() => {
        hudChannel.postMessage({ type: 'HEARTBEAT', callSid: lastCallSid, atMs: Date.now() });
      }, 2000);
      // Start audio capture (AudioContext created here = user gesture context from dial click)
      startAudioCapture();
    }

    async function startAudioCapture() {
      if (!hudDeepgramKey) {
        hudDeepgramKey = await fetchDeepgramKey();
      }
      if (!hudDeepgramKey) {
        console.warn('[hud-audio] No Deepgram key, running manual mode only');
        hudChannel.postMessage({ type: 'AUDIO_MODE', mode: 'manual' });
        return;
      }
      await startRepChannel();
      // Check for remote stream (may already be captured by RTCPeerConnection patch)
      if (hudRemoteStream) {
        startProspectChannel();
      } else {
        // Wait up to 5s for remote track, then fallback to manual mode
        setTimeout(() => {
          if (!hudRemoteStream) {
            console.warn('[hud-audio] No remote track after 5s, switching to manual mode');
            hudChannel.postMessage({ type: 'AUDIO_MODE', mode: 'manual' });
          }
        }, 5000);
      }
    }

    function hudOnCallDisconnect() {
      hudChannel.postMessage({
        type: 'CALL_ENDED',
        callSid: lastCallSid,
        seq: hudNextSeq(),
        atMs: Date.now(),
      });
      if (hudHeartbeatInterval) {
        clearInterval(hudHeartbeatInterval);
        hudHeartbeatInterval = null;
      }
      stopAudioCapture();
    }

    // beforeunload: send CALL_ENDED if dialer tab closes mid-call
    window.addEventListener('beforeunload', () => {
      if (isDialing && lastCallSid) {
        hudChannel.postMessage({
          type: 'CALL_ENDED',
          callSid: lastCallSid,
          seq: hudNextSeq(),
          atMs: Date.now(),
          reason: 'dialer_tab_closed',
        });
      }
    });

    // ── End Sales HUD audio bridge ──────────────────────────────────

    initTwilioDevice();
    loadLeads();
    refreshScoreboard();
  </script>
</body>
