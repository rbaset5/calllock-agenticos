<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CallLock Speed Dialer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid #262626;
      background: #111;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats {
      display: flex;
      gap: 20px;
      font-size: 13px;
      color: #a3a3a3;
    }

    .stats span { color: #fff; font-weight: 600; }

    .twilio-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .twilio-badge.ready { background: #1e3a5f; color: #60a5fa; }
    .twilio-badge.connecting { background: #78350f; color: #fbbf24; }
    .twilio-badge.error { background: #7f1d1d; color: #fca5a5; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      gap: 32px;
    }

    .lead-card {
      background: #171717;
      border: 1px solid #262626;
      border-radius: 16px;
      padding: 40px 48px;
      width: 100%;
      max-width: 640px;
      text-align: center;
    }

    .lead-number {
      font-size: 12px;
      color: #737373;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    .lead-company {
      font-size: 30px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .lead-phone {
      font-size: 36px;
      font-weight: 700;
      color: #22c55e;
      letter-spacing: 1px;
      margin-bottom: 12px;
      font-variant-numeric: tabular-nums;
    }

    .lead-address {
      font-size: 13px;
      color: #737373;
      margin-bottom: 12px;
    }

    .lead-meta {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
      color: #a3a3a3;
      margin-bottom: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #111827;
      border: 1px solid #1f2937;
    }

    .badge.score { color: #93c5fd; }
    .badge.tier { color: #fbbf24; text-transform: uppercase; }
    .badge.metro { color: #c4b5fd; }

    .signal-summary {
      margin-top: 12px;
      padding: 14px 16px;
      border: 1px solid #262626;
      border-radius: 12px;
      background: #111;
      font-size: 14px;
      color: #d4d4d4;
    }

    .call-hook {
      margin-top: 12px;
      padding: 14px 16px;
      border: 1px solid #163127;
      border-radius: 12px;
      background: #0d1b14;
      color: #bbf7d0;
      font-size: 14px;
      line-height: 1.5;
    }

    .call-hook strong { color: #86efac; }

    .dial-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      background: #22c55e;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dial-btn:hover { background: #16a34a; transform: scale(1.05); }
    .dial-btn:active { transform: scale(0.95); }
    .dial-btn.dialing { background: #ef4444; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 16px rgba(239, 68, 68, 0); }
    }

    .dial-hint {
      font-size: 12px;
      color: #525252;
      margin-top: 8px;
    }

    .call-status {
      font-size: 13px;
      color: #a3a3a3;
      margin-top: 4px;
      min-height: 18px;
    }

    .call-timer {
      font-size: 20px;
      color: #fbbf24;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      display: none;
      margin-top: 4px;
    }

    .recording-indicator {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #ef4444;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .recording-indicator .rec-dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse-rec 1.5s infinite;
    }

    @keyframes pulse-rec {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .shortcuts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 640px;
    }

    .shortcut {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #171717;
      border: 1px solid #262626;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.1s;
      user-select: none;
    }

    .shortcut:hover { border-color: #404040; background: #1f1f1f; }
    .shortcut:active { transform: scale(0.97); }

    .shortcut kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 5px;
      background: #262626;
      border-radius: 4px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      color: #d4d4d4;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #171717;
      border: 1px solid #262626;
      border-radius: 16px;
      padding: 32px;
      width: 440px;
      max-width: 90vw;
    }

    .modal h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .modal textarea {
      width: 100%;
      height: 120px;
      background: #0a0a0a;
      border: 1px solid #262626;
      border-radius: 8px;
      color: #e5e5e5;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      margin-bottom: 16px;
    }

    .modal textarea:focus { outline: none; border-color: #404040; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .modal-actions button {
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid #262626;
      background: #171717;
      color: #e5e5e5;
      font-size: 13px;
      cursor: pointer;
    }

    .modal-actions button.primary {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 12px 24px;
      background: #262626;
      border: 1px solid #404040;
      border-radius: 8px;
      font-size: 14px;
      z-index: 200;
      transition: transform 0.2s;
    }

    .toast.visible { transform: translateX(-50%) translateY(0); }

    .empty-state {
      text-align: center;
      color: #525252;
      padding: 60px;
    }

    .empty-state h2 { font-size: 24px; margin-bottom: 12px; color: #737373; }
    .empty-state p { font-size: 14px; margin-bottom: 24px; }

    /* Tab navigation */
    .tab-nav {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #262626;
      background: #111;
      padding: 0 24px;
    }
    .tab-btn {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: #737373;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: #a3a3a3; }
    .tab-btn.active { color: #fff; border-bottom-color: #22c55e; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Today's Plan styles */
    .plan-container { padding: 24px; max-width: 800px; }
    .plan-header { margin-bottom: 20px; }
    .plan-header h2 { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .plan-header p { font-size: 13px; color: #737373; }
    .plan-block { margin-bottom: 24px; }
    .plan-block-title {
      font-size: 14px; font-weight: 600; color: #22c55e;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 8px; padding-bottom: 4px;
      border-bottom: 1px solid #1a1a1a;
    }
    .plan-sprint {
      display: flex; align-items: baseline; gap: 12px;
      padding: 8px 0; border-bottom: 1px solid #1a1a1a;
      font-size: 13px;
    }
    .plan-sprint:last-child { border-bottom: none; }
    .plan-time { color: #737373; min-width: 60px; font-variant-numeric: tabular-nums; }
    .plan-metro { color: #3b82f6; font-weight: 600; min-width: 60px; }
    .plan-count { color: #a3a3a3; min-width: 70px; }
    .plan-note { color: #525252; font-style: italic; }
    .plan-callbacks { margin-bottom: 20px; }
    .plan-callbacks h3 { font-size: 14px; color: #eab308; margin-bottom: 8px; }
    .plan-callback-item {
      display: flex; gap: 16px; padding: 8px 12px;
      background: #171717; border-radius: 6px; margin-bottom: 6px;
      font-size: 13px; align-items: center;
    }
    .plan-callback-name { color: #fff; font-weight: 500; min-width: 180px; }
    .plan-callback-phone { color: #22c55e; }
    .plan-callback-metro { color: #737373; }
    .plan-fallback {
      text-align: center; color: #eab308; padding: 16px;
      background: #1a1700; border-radius: 8px; margin-bottom: 16px;
      font-size: 13px;
    }
    .plan-summary {
      display: flex; gap: 24px; padding: 12px 0;
      border-top: 1px solid #262626; margin-top: 12px;
      font-size: 13px; color: #a3a3a3;
    }
    .plan-summary span { color: #fff; font-weight: 600; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@twilio/voice-sdk@2/dist/twilio.min.js"></script>
</head>
<body>
  <header>
    <h1>
      CallLock Speed Dialer
      <span class="twilio-badge connecting" id="twilio-badge">Connecting...</span>
    </h1>
    <div class="stats">
      <div>Dialed: <span id="stat-dialed">0</span></div>
      <div>Remaining: <span id="stat-remaining">0</span></div>
      <div>Interested: <span id="stat-interested">0</span></div>
      <div>Demos: <span id="stat-demos">0</span></div>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('dial')">Speed Dial</button>
    <button class="tab-btn" onclick="switchTab('plan')">Today's Plan</button>
  </nav>

  <div id="tab-dial" class="tab-content active">
    <main id="main-content">
      <div class="empty-state" id="empty-state">
        <h2>Loading ranked prospects</h2>
        <p>Fetching call-ready leads from Supabase.</p>
      </div>
    </main>
  </div>

  <div id="tab-plan" class="tab-content">
    <div class="plan-container" id="plan-content">
      <div class="empty-state">
        <h2>Loading today's plan...</h2>
        <p>Fetching sprint schedule from harness.</p>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Notes</h2>
      <textarea id="modal-notes" placeholder="Add notes about this lead..."></textarea>
      <div class="modal-actions">
        <button onclick="closeModal()">Cancel</button>
        <button class="primary" onclick="submitModal()">Save & Next</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let leads = [];
    let currentIndex = 0;
    let isDialing = false;
    let modalOutcome = null;
    let twilioDevice = null;
    let activeCall = null;
    let lastCallSid = null;
    let callStartTime = null;
    let callTimerInterval = null;

    const CALL_SERVER = window.location.origin;
    const stats = { dialed: 0, interested: 0, demos: 0 };
    const log = [];

    async function initTwilioDevice() {
      updateTwilioBadge('connecting');
      try {
        const response = await fetch(`${CALL_SERVER}/token`);
        if (!response.ok) throw new Error(`Token fetch failed: ${response.status}`);
        const { token } = await response.json();

        twilioDevice = new Twilio.Device(token, {
          codecPreferences: ['opus', 'pcmu'],
          edge: 'ashburn',
        });

        twilioDevice.on('registered', () => updateTwilioBadge('ready'));
        twilioDevice.on('unregistered', () => updateTwilioBadge('connecting'));
        twilioDevice.on('error', (error) => {
          console.error('[twilio] Device error:', error);
          updateTwilioBadge('error');
          showToast(`Twilio error: ${error.message}`);
        });
        twilioDevice.on('tokenWillExpire', async () => {
          const tokenResponse = await fetch(`${CALL_SERVER}/token`);
          const { token: nextToken } = await tokenResponse.json();
          twilioDevice.updateToken(nextToken);
        });

        await twilioDevice.register();
      } catch (error) {
        console.error('[twilio] init failed:', error);
        updateTwilioBadge('error');
      }
    }

    function updateTwilioBadge(state) {
      const badge = document.getElementById('twilio-badge');
      badge.className = `twilio-badge ${state}`;
      badge.textContent = state === 'ready' ? 'Voice Ready' : state === 'connecting' ? 'Connecting...' : 'Voice Error';
    }

    function renderLead() {
      const main = document.getElementById('main-content');

      if (leads.length === 0) return;
      if (currentIndex >= leads.length) {
        main.innerHTML = `
          <div class="empty-state">
            <h2>All Done</h2>
            <p>You worked through ${leads.length} call-ready prospects.</p>
            <p>Dialed: ${stats.dialed} | Interested: ${stats.interested} | Demos: ${stats.demos}</p>
          </div>
        `;
        return;
      }

      const lead = leads[currentIndex];
      main.innerHTML = `
        <div class="lead-card">
          <div class="lead-number">Lead ${currentIndex + 1} of ${leads.length}</div>
          <div class="lead-company">${escapeHtml(lead.business_name || '')}</div>
          <div class="lead-phone">${formatPhone(lead.phone || '')}</div>
          <div class="lead-address">${escapeHtml(lead.address || '')}</div>
          <div class="lead-meta">
            <span class="badge score">Score ${lead.total_score || 0}</span>
            <span class="badge tier">${escapeHtml(lead.tier || 'unscored')}</span>
            ${lead.metro ? `<span class="badge metro">${escapeHtml(lead.metro)}</span>` : ''}
            ${lead.website ? `<span class="badge"><a href="${escapeHtml(lead.website)}" target="_blank" style="color:#a3a3a3;text-decoration:none">website</a></span>` : ''}
          </div>
          <div class="signal-summary">${escapeHtml(lead.signal_summary || '')}</div>
          <div class="call-hook"><strong>Hook:</strong> ${escapeHtml(lead.call_hook || '')}</div>
        </div>

        <div>
          <button class="dial-btn" id="dial-btn" onclick="toggleDial()">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </button>
          <div class="dial-hint">Space to dial or hang up</div>
          <div class="call-status" id="call-status"></div>
          <div class="call-timer" id="call-timer">0:00</div>
          <div class="recording-indicator" id="recording-indicator">
            <span class="rec-dot"></span> REC
          </div>
        </div>

        <div class="shortcuts">
          <div class="shortcut" onclick="logOutcome('no_answer')"><kbd>1</kbd> No Answer</div>
          <div class="shortcut" onclick="logOutcome('voicemail')"><kbd>2</kbd> Voicemail</div>
          <div class="shortcut" onclick="logOutcome('not_interested')"><kbd>3</kbd> Not Interested</div>
          <div class="shortcut" onclick="logOutcome('wrong_number')"><kbd>4</kbd> Wrong Number</div>
          <div class="shortcut" onclick="logOutcome('interested')"><kbd>I</kbd> Interested</div>
          <div class="shortcut" onclick="logOutcome('demo')"><kbd>D</kbd> Demo</div>
        </div>
      `;

      updateStats();
    }

    function updateStats() {
      document.getElementById('stat-dialed').textContent = stats.dialed;
      document.getElementById('stat-remaining').textContent = Math.max(0, leads.length - currentIndex);
      document.getElementById('stat-interested').textContent = stats.interested;
      document.getElementById('stat-demos').textContent = stats.demos;
    }

    function formatPhone(phone) {
      const digits = phone.replace(/\D/g, '');
      if (digits.length === 11 && digits[0] === '1') {
        return `(${digits.slice(1, 4)}) ${digits.slice(4, 7)}-${digits.slice(7)}`;
      }
      if (digits.length === 10) {
        return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
      }
      return phone;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function updateCallStatus(text) {
      const element = document.getElementById('call-status');
      if (element) element.textContent = text;
    }

    function startCallTimer() {
      const timerEl = document.getElementById('call-timer');
      const recEl = document.getElementById('recording-indicator');
      if (timerEl) timerEl.style.display = 'block';
      if (recEl) recEl.style.display = 'flex';

      callTimerInterval = setInterval(() => {
        if (!callStartTime) return;
        const elapsed = Math.round((Date.now() - callStartTime) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        if (timerEl) timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
      }, 1000);
    }

    function stopCallTimer() {
      clearInterval(callTimerInterval);
      callTimerInterval = null;
      const recEl = document.getElementById('recording-indicator');
      if (recEl) recEl.style.display = 'none';
    }

    async function toggleDial() {
      if (currentIndex >= leads.length) return;
      const lead = leads[currentIndex];
      const button = document.getElementById('dial-btn');

      if (!isDialing) {
        if (!twilioDevice) {
          showToast('Twilio not ready');
          return;
        }

        try {
          activeCall = await twilioDevice.connect({ params: { To: lead.phone } });
          button.classList.add('dialing');
          isDialing = true;
          stats.dialed += 1;
          updateStats();
          updateCallStatus('Connecting...');

          activeCall.on('ringing', () => updateCallStatus('Ringing...'));
          activeCall.on('accept', () => {
            callStartTime = Date.now();
            lastCallSid = activeCall.parameters.CallSid;
            updateCallStatus('Connected');
            startCallTimer();
          });
          activeCall.on('disconnect', () => {
            const duration = callStartTime ? Math.round((Date.now() - callStartTime) / 1000) : 0;
            updateCallStatus(`Ended (${duration}s)`);
            stopCallTimer();
            button.classList.remove('dialing');
            isDialing = false;
            activeCall = null;
            callStartTime = null;
          });
          activeCall.on('error', (error) => {
            console.error('[twilio] call error:', error);
            stopCallTimer();
            button.classList.remove('dialing');
            isDialing = false;
            activeCall = null;
            updateCallStatus('');
            showToast(`Call error: ${error.message}`);
          });
        } catch (error) {
          showToast(`Failed to connect: ${error.message}`);
        }
      } else if (activeCall) {
        activeCall.disconnect();
      }
    }

    function sendCallMetadata(lead, outcome, notes) {
      if (!lastCallSid) return;
      fetch(`${CALL_SERVER}/calls/${lastCallSid}/metadata`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prospectId: lead.id,
          businessName: lead.business_name,
          outcome,
          notes,
          callHookUsed: lead.call_hook,
        }),
      }).catch((error) => console.error('[call-server] metadata failed:', error));
    }

    function logOutcome(outcome) {
      if (currentIndex >= leads.length) return;
      if (outcome === 'interested' || outcome === 'demo') {
        modalOutcome = outcome;
        document.getElementById('modal-title').textContent =
          outcome === 'interested' ? 'Interested — Add Notes' : 'Demo Scheduled — Add Notes';
        document.getElementById('modal-notes').value = '';
        document.getElementById('modal-overlay').classList.add('active');
        setTimeout(() => document.getElementById('modal-notes').focus(), 100);
        return;
      }
      saveOutcome(outcome, '');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
      modalOutcome = null;
    }

    function submitModal() {
      const notes = document.getElementById('modal-notes').value;
      document.getElementById('modal-overlay').classList.remove('active');
      saveOutcome(modalOutcome, notes);
      modalOutcome = null;
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2500);
    }

    function saveOutcome(outcome, notes) {
      const lead = leads[currentIndex];
      log.push({
        timestamp: new Date().toISOString(),
        index: currentIndex,
        company: lead.business_name,
        phone: lead.phone,
        outcome,
        notes,
      });

      if (outcome === 'interested') stats.interested += 1;
      if (outcome === 'demo') {
        stats.interested += 1;
        stats.demos += 1;
      }

      const labels = {
        no_answer: 'No Answer',
        voicemail: 'Voicemail Left',
        not_interested: 'Not Interested',
        wrong_number: 'Wrong Number',
        interested: 'Interested',
        demo: 'Demo Scheduled',
      };
      showToast(labels[outcome] || outcome);

      if (activeCall) activeCall.disconnect();
      isDialing = false;
      updateCallStatus('');
      localStorage.setItem('calllock-log', JSON.stringify(log));
      sendCallMetadata(lead, outcome, notes);
      lastCallSid = null;
      currentIndex += 1;
      localStorage.setItem('calllock-index', currentIndex);
      renderLead();
    }

    function restoreSession() {
      const savedIndex = localStorage.getItem('calllock-index');
      if (savedIndex) currentIndex = parseInt(savedIndex, 10);

      const savedLog = localStorage.getItem('calllock-log');
      if (savedLog) {
        const parsed = JSON.parse(savedLog);
        log.push(...parsed);
        parsed.forEach((entry) => {
          stats.dialed += 1;
          if (entry.outcome === 'interested') stats.interested += 1;
          if (entry.outcome === 'demo') {
            stats.interested += 1;
            stats.demos += 1;
          }
        });
      }
    }

    async function loadLeads() {
      try {
        document.getElementById('empty-state').innerHTML = `
          <h2>Loading ranked prospects</h2>
          <p>Fetching call-ready leads from Supabase.</p>
        `;
        const response = await fetch(`${CALL_SERVER}/prospects`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        leads = payload.prospects || [];
        if (leads.length === 0) {
          document.getElementById('empty-state').innerHTML = `
            <h2>No call-ready prospects</h2>
            <p>Score and probe leads first, then reload the dialer.</p>
          `;
          return;
        }
        restoreSession();
        renderLead();
      } catch (error) {
        console.error('[dialer] load failed:', error);
        document.getElementById('empty-state').innerHTML = `
          <h2>Could not load prospects</h2>
          <p>${escapeHtml(error.message)}</p>
        `;
      }
    }

    document.addEventListener('keydown', (event) => {
      const modalOpen = document.getElementById('modal-overlay').classList.contains('active');
      if (event.key === 'Escape' && modalOpen) {
        closeModal();
        return;
      }
      if (event.key === 'Enter' && modalOpen) {
        submitModal();
        return;
      }
      if (modalOpen) return;
      if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;

      switch (event.key) {
        case ' ':
          event.preventDefault();
          toggleDial();
          break;
        case '1':
          logOutcome('no_answer');
          break;
        case '2':
          logOutcome('voicemail');
          break;
        case '3':
          logOutcome('not_interested');
          break;
        case '4':
          logOutcome('wrong_number');
          break;
        case 'i':
        case 'I':
          logOutcome('interested');
          break;
        case 'd':
        case 'D':
          logOutcome('demo');
          break;
      }
    });

    // Tab switching
    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(`tab-${tabId}`).classList.add('active');
      const selector = tabId === 'dial' ? 0 : 1;
      document.querySelectorAll('.tab-btn')[selector].classList.add('active');
      if (tabId === 'plan') loadPlan();
    }

    // Today's Plan
    let planLoaded = false;

    async function loadPlan() {
      const container = document.getElementById('plan-content');
      try {
        const response = await fetch(`${CALL_SERVER}/daily-plan`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const plan = await response.json();
        planLoaded = true;
        renderPlan(plan, container);
      } catch (error) {
        container.textContent = '';
        const errDiv = document.createElement('div');
        errDiv.className = 'empty-state';
        const h2 = document.createElement('h2');
        h2.textContent = 'Could not load plan';
        const p = document.createElement('p');
        p.textContent = error.message;
        errDiv.appendChild(h2);
        errDiv.appendChild(p);
        container.appendChild(errDiv);
      }
    }

    function renderPlan(plan, container) {
      container.textContent = '';

      // Header
      const header = document.createElement('div');
      header.className = 'plan-header';
      const h2 = document.createElement('h2');
      h2.textContent = `Week ${plan.week || '?'} ${plan.day_of_week ? '\u2014 ' + plan.day_of_week : ''} ${plan.date || ''}`;
      header.appendChild(h2);
      if (plan.message) {
        const p = document.createElement('p');
        p.textContent = plan.message;
        header.appendChild(p);
        container.appendChild(header);
        return;
      }
      container.appendChild(header);

      // Fallback warning
      if (plan.fallback) {
        const warn = document.createElement('div');
        warn.className = 'plan-fallback';
        warn.textContent = 'Harness unavailable. Showing default ranked list.';
        container.appendChild(warn);
      }

      // Callbacks section
      const callbacks = plan.callbacks || [];
      if (callbacks.length > 0) {
        const cbSection = document.createElement('div');
        cbSection.className = 'plan-callbacks';
        const cbTitle = document.createElement('h3');
        cbTitle.textContent = `Callbacks Due (${callbacks.length})`;
        cbSection.appendChild(cbTitle);
        for (const cb of callbacks) {
          const item = document.createElement('div');
          item.className = 'plan-callback-item';
          const name = document.createElement('span');
          name.className = 'plan-callback-name';
          name.textContent = cb.business_name || '';
          const phone = document.createElement('span');
          phone.className = 'plan-callback-phone';
          phone.textContent = formatPhone(cb.phone || cb.phone_normalized || '');
          const metro = document.createElement('span');
          metro.className = 'plan-callback-metro';
          metro.textContent = cb.metro || '';
          item.appendChild(name);
          item.appendChild(phone);
          item.appendChild(metro);
          if (cb.notes) {
            const note = document.createElement('span');
            note.className = 'plan-note';
            note.textContent = cb.notes;
            item.appendChild(note);
          }
          cbSection.appendChild(item);
        }
        container.appendChild(cbSection);
      }

      // Sprint blocks
      const blocks = plan.blocks || [];
      for (const block of blocks) {
        const blockDiv = document.createElement('div');
        blockDiv.className = 'plan-block';
        const blockTitle = document.createElement('div');
        blockTitle.className = 'plan-block-title';
        blockTitle.textContent = `${block.block} Block \u2014 ${block.start_et} ET`;
        blockDiv.appendChild(blockTitle);
        for (const sprint of (block.sprints || [])) {
          const row = document.createElement('div');
          row.className = 'plan-sprint';
          const time = document.createElement('span');
          time.className = 'plan-time';
          time.textContent = sprint.start_et || '';
          const metroSpan = document.createElement('span');
          metroSpan.className = 'plan-metro';
          metroSpan.textContent = (sprint.metro || '').toUpperCase();
          const count = document.createElement('span');
          count.className = 'plan-count';
          count.textContent = `${sprint.lead_count || 0} leads`;
          row.appendChild(time);
          row.appendChild(metroSpan);
          row.appendChild(count);
          if (sprint.note) {
            const note = document.createElement('span');
            note.className = 'plan-note';
            note.textContent = sprint.note;
            row.appendChild(note);
          }
          blockDiv.appendChild(row);
        }
        container.appendChild(blockDiv);
      }

      // Summary
      const totalSprints = plan.total_sprints || 0;
      const totalDials = totalSprints * (plan.dials_per_sprint || 10);
      const summary = document.createElement('div');
      summary.className = 'plan-summary';
      for (const [label, value] of [['Sprints', totalSprints], ['Target Dials', totalDials], ['Callbacks', callbacks.length], ['Fresh Leads', plan.total_fresh || 0]]) {
        const div = document.createElement('div');
        div.textContent = `${label}: `;
        const span = document.createElement('span');
        span.textContent = String(value);
        div.appendChild(span);
        summary.appendChild(div);
      }
      container.appendChild(summary);
    }

    initTwilioDevice();
    loadLeads();
  </script>
</body>
</html>
