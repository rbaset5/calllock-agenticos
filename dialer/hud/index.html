<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales HUD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Top bar ────────────────────────────────────── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 20px;
      background: #111;
      border-bottom: 1px solid #262626;
      flex-shrink: 0;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .top-bar-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #525252;
    }

    .audio-mode-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      background: #1e3a5f;
      color: #60a5fa;
    }

    .audio-mode-badge.manual-mode {
      background: #7f1d1d;
      color: #fca5a5;
      animation: pulse-red 1.5s ease-in-out infinite;
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .call-timer {
      font-size: 14px;
      font-weight: 600;
      color: #a3a3a3;
      font-variant-numeric: tabular-nums;
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .prospect-info {
      font-size: 13px;
      color: #a3a3a3;
    }

    .prospect-info strong {
      color: #fff;
      font-weight: 600;
    }

    /* ── Stage bar ──────────────────────────────────── */
    .stage-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 64px;
      padding: 0 20px;
      background: #0f0f0f;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    .context-strip {
      display: none;
      flex-direction: column;
      gap: 4px;
      padding: 8px 20px;
      background: #0f0f0f;
      border-bottom: 1px solid #1a1a1a;
      font-size: 12px;
      color: #737373;
      flex-shrink: 0;
    }

    .context-strip.visible { display: flex; }

    .context-strip-top {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .context-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .context-badge.am { background: #14532d; color: #4ade80; }
    .context-badge.mid { background: #1e3a5f; color: #60a5fa; }
    .context-badge.eod { background: #78350f; color: #fbbf24; }
    .context-badge.break { background: #262626; color: #d4d4d4; }

    .context-strip-value { color: #e5e5e5; }
    .context-strip-countdown { color: #fbbf24; font-variant-numeric: tabular-nums; }
    .context-strip-note { color: #525252; font-style: italic; }

    .stage-pill {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #333;
      color: #525252;
      background: transparent;
      transition: all 0.2s ease;
    }

    .stage-pill.past {
      color: #737373;
      border-color: #404040;
      background: #1a1a1a;
    }

    .stage-pill.current {
      color: #0a0a0a;
      background: #22c55e;
      border-color: #22c55e;
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.3);
    }

    .stage-pill.future {
      color: #404040;
      border-color: #2a2a2a;
    }

    /* ── Main area ──────────────────────────────────── */
    .main-area {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* Center panel — NOW card */
    .now-panel {
      flex: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      transition: background 0.4s ease;
    }

    /* Stage-specific background tints */
    .now-panel[data-stage="OPENER"]     { background: linear-gradient(135deg, rgba(34,197,94,0.04) 0%, transparent 60%); }
    .now-panel[data-stage="BRIDGE"]     { background: linear-gradient(135deg, rgba(34,197,94,0.06) 0%, transparent 60%); }
    .now-panel[data-stage="QUALIFIER"]  { background: linear-gradient(135deg, rgba(59,130,246,0.06) 0%, transparent 60%); }
    .now-panel[data-stage="CLOSE"]      { background: linear-gradient(135deg, rgba(59,130,246,0.06) 0%, transparent 60%); }
    .now-panel[data-stage="OBJECTION"]  { background: linear-gradient(135deg, rgba(245,158,11,0.06) 0%, transparent 60%); }
    .now-panel[data-stage="BOOKED"]     { background: linear-gradient(135deg, rgba(34,197,94,0.1) 0%, transparent 60%); }
    .now-panel[data-stage="EXIT"]       { background: linear-gradient(135deg, rgba(239,68,68,0.06) 0%, transparent 60%); }
    .now-panel[data-stage="NON_CONNECT"]{ background: linear-gradient(135deg, rgba(239,68,68,0.06) 0%, transparent 60%); }

    .preview-hint {
      font-size: 16px;
      color: #e5e5e5;
      opacity: 0.4;
      margin-bottom: 16px;
      min-height: 22px;
      text-align: center;
      max-width: 700px;
    }

    .now-line {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      line-height: 1.35;
      max-width: 740px;
      margin-bottom: 20px;
    }

    .now-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .now-why {
      font-size: 14px;
      color: #737373;
    }

    .confidence-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 10px;
      letter-spacing: 0.5px;
    }

    .confidence-badge.rules    { background: #14532d; color: #4ade80; }
    .confidence-badge.llm      { background: #1e3a5f; color: #60a5fa; }
    .confidence-badge.manual   { background: #262626; color: #a3a3a3; }
    .confidence-badge.fallback { background: #78350f; color: #fbbf24; }
    .confidence-badge.manual-mode-badge {
      background: #7f1d1d;
      color: #fca5a5;
      animation: pulse-red 1.5s ease-in-out infinite;
    }

    .line-bank {
      position: absolute;
      left: 32px;
      right: 32px;
      bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 45%;
      overflow-y: auto;
      padding: 16px 18px;
      border-top: 1px solid #262626;
      border-radius: 18px 18px 14px 14px;
      background: rgba(10, 10, 10, 0.95);
      box-shadow: 0 -18px 40px rgba(0, 0, 0, 0.25);
    }

    .line-bank-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .line-bank-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      color: #525252;
    }

    .line-bank-row {
      display: flex;
      align-items: baseline;
      gap: 14px;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #262626;
      border-left-width: 3px;
      border-radius: 10px;
      background: #111;
      color: #e5e5e5;
      text-align: left;
      cursor: pointer;
    }

    .line-bank-row:hover {
      border-color: #404040;
      background: #141414;
    }

    .line-bank-row.stage { border-left-color: #22c55e; }
    .line-bank-row.power { border-left-color: #f59e0b; }

    .line-bank-label {
      min-width: 140px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: #a3a3a3;
      text-transform: uppercase;
    }

    .line-bank-text {
      font-size: 13px;
      line-height: 1.4;
      color: #f5f5f5;
    }

    /* Side panels — Lines and Objections */
    .side-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0d0d0d;
      overflow: hidden;
    }
    .lines-panel { border-right: 1px solid #1a1a1a; }
    .objections-panel { border-left: 1px solid #1a1a1a; }

    .side-panel-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #525252;
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    .side-panel-feed {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .side-panel-feed::-webkit-scrollbar { width: 4px; }
    .side-panel-feed::-webkit-scrollbar-track { background: transparent; }
    .side-panel-feed::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* Round history strip */
    .round-strip {
      display: flex;
      justify-content: center;
      gap: 4px;
      padding: 4px 20px;
      flex-shrink: 0;
      min-height: 24px;
    }

    .round-bubble {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #737373;
      flex-shrink: 0;
    }

    .round-bubble.current {
      border-color: #22c55e;
      color: #22c55e;
      background: rgba(34, 197, 94, 0.1);
    }

    .round-bubble.past { border-color: #404040; color: #525252; }

    /* ── Objection picker grid ─────────────────────── */
    .objection-picker {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      max-width: 600px;
      width: 100%;
    }

    .objection-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 16px 20px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #141414;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .objection-card:hover {
      border-color: #f59e0b;
      background: rgba(245, 158, 11, 0.08);
    }

    .objection-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .objection-card-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      font-size: 13px;
      font-weight: 800;
      border-radius: 5px;
      border: 1px solid #f59e0b;
      color: #f59e0b;
      background: rgba(245, 158, 11, 0.1);
      flex-shrink: 0;
    }

    .objection-card-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .objection-card-cues {
      font-size: 12px;
      color: #737373;
      line-height: 1.4;
    }

    /* ── Quick-pick strip (always visible below NOW) ── */
    .quick-pick-strip {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 8px 16px;
      flex-shrink: 0;
    }

    .quick-pick-strip:empty {
      display: none;
    }

    .quick-pick {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #141414;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 12px;
      color: #a3a3a3;
    }

    .quick-pick:hover {
      border-color: #f59e0b;
      background: rgba(245, 158, 11, 0.08);
      color: #fff;
    }

    .quick-pick-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      font-size: 11px;
      font-weight: 800;
      border-radius: 4px;
      border: 1px solid #555;
      color: #999;
      background: #1a1a1a;
      flex-shrink: 0;
    }

    .quick-pick:hover .quick-pick-key {
      border-color: #f59e0b;
      color: #f59e0b;
    }

    .quick-pick-label {
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .quick-pick-cue {
      color: #525252;
      font-size: 11px;
    }


    /* ── Hotkey legend ──────────────────────────────── */
    .hotkey-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      height: 36px;
      padding: 0 20px;
      background: #0d0d0d;
      border-top: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    .bridge-hotkey-bar {
      border-top: none;
      border-bottom: 1px solid #1a1a1a;
    }
    .bridge-hotkey-bar .hotkey-item { color: #3b82f6; }
    .bridge-hotkey-bar .hotkey-item kbd { border-color: #3b82f6; color: #3b82f6; }

    .objection-hotkey-bar {
      border-top: none;
      border-bottom: 1px solid #1a1a1a;
    }

    .hotkey-item {
      font-size: 11px;
      color: #525252;
    }

    .hotkey-item kbd {
      display: inline-block;
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #737373;
      margin-right: 3px;
    }

    /* ── FAQ box ────────────────────────────────────── */
    #faq-box {
      max-height: 40vh;
      overflow-y: auto;
      background: #111;
      border-top: 1px solid #22c55e33;
      padding: 8px 12px;
      flex-shrink: 0;
    }
    #faq-box::-webkit-scrollbar { width: 4px; }
    #faq-box::-webkit-scrollbar-track { background: transparent; }
    #faq-box::-webkit-scrollbar-thumb { background: #22c55e44; border-radius: 2px; }
    .faq-header {
      font-size: 10px;
      font-weight: 700;
      color: #22c55e;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .faq-item {
      cursor: pointer;
      padding: 3px 0;
      border-bottom: 1px solid #1a1a1a;
    }
    .faq-question {
      font-size: 11px;
      color: #a1a1aa;
      font-weight: 600;
    }
    .faq-answer {
      font-size: 11px;
      color: #71717a;
      display: none;
      padding: 2px 0 4px;
      line-height: 1.4;
    }
    .faq-item.expanded .faq-answer { display: block; }
    .faq-item.faq-highlight {
      animation: faq-pulse 3s ease-out;
    }
    .faq-item.faq-highlight .faq-answer { display: block; }
    @keyframes faq-pulse {
      0% { border-left: 3px solid #22c55e; padding-left: 8px; background: #22c55e11; }
      100% { border-left: 3px solid transparent; padding-left: 8px; background: transparent; }
    }
    .faq-competitor-section {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #22c55e22;
    }
    .faq-competitor-header {
      font-size: 10px;
      font-weight: 700;
      color: #eab308;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .faq-competitor-item {
      font-size: 10px;
      color: #71717a;
      padding: 2px 0;
    }
    .faq-competitor-name {
      color: #eab308;
      font-weight: 600;
    }

    /* ── Stage transition flash ────────────────────── */
    @keyframes flash-green {
      0% { box-shadow: inset 0 0 0 2px #22c55e; }
      100% { box-shadow: inset 0 0 0 0px transparent; }
    }
    @keyframes flash-blue {
      0% { box-shadow: inset 0 0 0 2px #3b82f6; }
      100% { box-shadow: inset 0 0 0 0px transparent; }
    }
    .flash-manual { animation: flash-green 0.4s ease-out; }
    .flash-ai { animation: flash-blue 0.4s ease-out; }

    /* ── v2 center panel stack ─────────────────────── */
    .v2-move-pill {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 12px;
      background: #312e81;
      color: #a5b4fc;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
      border: 1px solid #4338ca44;
    }
    .v2-move-pill:empty { display: none; }
    .v2-now {
      color: #a1a1aa;
      font-size: 12px;
      font-style: italic;
      margin-bottom: 8px;
      min-height: 16px;
    }
    .v2-alt {
      color: #71717a;
      font-size: 13px;
      padding: 6px 10px;
      border-left: 2px solid #27272a;
      margin: 6px 0;
      min-height: 20px;
      display: none;
    }
    .v2-pause {
      text-align: center;
      padding: 6px;
      font-size: 11px;
      color: #fbbf24;
      border: 1px solid #fbbf2433;
      border-radius: 6px;
      margin: 8px 0;
      transition: opacity 0.5s;
      display: none;
    }
    .v2-pause.dimmed { opacity: 0.3; }
    .v2-listen {
      font-size: 11px;
      color: #a1a1aa;
      margin: 6px 0;
      display: none;
    }
    .v2-next {
      font-size: 11px;
      color: #818cf8;
      margin: 6px 0;
      display: none;
    }
    .v2-also-heard {
      color: #fbbf24;
      font-size: 11px;
      padding: 3px 8px;
      margin: 4px 0;
      border-left: 2px solid #fbbf2466;
      opacity: 1;
      transition: opacity 1.5s ease-out;
    }
    .v2-donot {
      background: #7f1d1d33;
      color: #fca5a5;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      margin: 6px 0;
    }
    .v2-listen-label, .v2-next-label {
      color: #52525b;
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    /* v2 left rail: prospect context */
    .v2-context-rail { padding: 8px 12px; }
    /* Stage briefing: GOAL + LISTEN FOR */
    #v2-stage-briefing { padding-bottom: 8px; border-bottom: 1px solid #27272a; margin-bottom: 8px; }
    #v2-stage-briefing:empty { display: none; padding: 0; border: none; margin: 0; }
    #v2-stage-briefing .v2-ctx-label { color: #22c55e; }
    .v2-briefing-goal { font-size: 14px; color: #e5e5e5; margin-bottom: 4px; }
    .v2-briefing-listen { font-size: 11px; color: #a1a1aa; }
    /* Compact identity separator */
    .v2-compact-id { font-size: 13px; font-weight: 600; color: #e5e5e5; padding-bottom: 8px; border-bottom: 1px solid #27272a; margin-bottom: 8px; }
    .v2-compact-id-fallback { font-size: 13px; color: #737373; font-style: italic; padding-bottom: 8px; border-bottom: 1px solid #27272a; margin-bottom: 8px; }
    .v2-ctx-section { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #27272a; }
    .v2-ctx-section:empty { display: none; }
    .v2-ctx-label { color: #52525b; font-size: 10px; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
    .v2-ctx-value { color: #e5e5e5; font-size: 13px; }
    .v2-ctx-inferred { color: #71717a; font-style: italic; font-size: 12px; }
    /* v2 right rail: tactical support card */
    .v2-tactical { padding: 8px 12px; }
    .v2-tac-section { margin-bottom: 10px; }
    .v2-tac-section:empty { display: none; }
    .v2-tac-label { color: #52525b; font-size: 10px; font-weight: 600; text-transform: uppercase; margin-bottom: 2px; }
    .v2-tac-value { color: #d4d4d8; font-size: 12px; line-height: 1.4; }
    .v2-transcript-health {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
      display: none;
    }
    .v2-transcript-health.stale {
      display: inline-block;
      background: #78350f33;
      color: #fbbf24;
    }
    .v2-transcript-health.offline {
      display: inline-block;
      background: #7f1d1d44;
      color: #f87171;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="top-bar-label">SALES HUD</span>
      <span class="audio-mode-badge" id="audioModeBadge">DUAL</span>
      <span class="call-timer" id="callTimer">00:00</span>
    </div>
    <div class="top-bar-right">
      <span class="prospect-info" id="prospectInfo">No active call</span>
    </div>
  </div>

  <div class="context-strip" id="contextStrip"></div>

  <!-- Stage bar -->
  <div class="stage-bar" id="stageBar">
    <span class="stage-pill future" data-stage="IDLE">IDLE</span>
    <span class="stage-pill future" data-stage="GATEKEEPER">GK</span>
    <span class="stage-pill future" data-stage="OPENER">OPEN</span>
    <span class="stage-pill future" data-stage="MINI_PITCH">MINI</span>
    <span class="stage-pill future" data-stage="WRONG_PERSON">WRONG</span>
    <span class="stage-pill future" data-stage="BRIDGE">BRIDGE</span>
    <span class="stage-pill future" data-stage="QUALIFIER">QUAL</span>
    <span class="stage-pill future" data-stage="PRICING">PRICE</span>
    <span class="stage-pill future" data-stage="CLOSE">CLOSE</span>
    <span class="stage-pill future" data-stage="OBJECTION">OBJ</span>
    <span class="stage-pill future" data-stage="EXIT">EXIT</span>
    <span class="stage-pill future" data-stage="BOOKED">BOOKED</span>
  </div>

  <!-- Round history strip -->
  <div class="round-strip" id="roundStrip"></div>

  <!-- Main area: 3-column layout -->
  <div class="main-area">
    <div class="side-panel lines-panel" id="linesPanel">
      <!-- v2 left rail: prospect context -->
      <div id="v2-prospect-context" class="v2-context-rail">
        <div id="v2-prospect-identity" class="v2-ctx-section"></div>
        <div id="v2-stage-briefing" class="v2-ctx-section"></div>
        <div id="v2-prospect-why" class="v2-ctx-section"></div>
        <div id="v2-prospect-outreach" class="v2-ctx-section"></div>
        <div id="v2-prospect-fit" class="v2-ctx-section"></div>
        <div id="v2-prospect-reviews" class="v2-ctx-section"></div>
      </div>
      <div class="side-panel-header">LINES</div>
      <div class="side-panel-feed" id="linesFeed"></div>
      <div id="faq-box"></div>
    </div>
    <div class="now-panel" id="nowPanel" data-stage="IDLE">
      <div class="preview-hint" id="previewHint"></div>
      <div class="now-line" id="nowLine">Waiting for call...</div>
      <div class="now-meta">
        <span class="now-why" id="nowWhy"></span>
        <span class="confidence-badge manual" id="confidenceBadge"></span>
        <span id="v2-transcript-health" class="v2-transcript-health"></span>
      </div>
      <!-- v2 center stack -->
      <div id="v2-move-type" class="v2-move-pill"></div>
      <div id="v2-now-summary" class="v2-now"></div>
      <div id="v2-backup-line" class="v2-alt"></div>
      <div id="v2-also-heard" class="v2-also-heard" style="display:none"></div>
      <div id="v2-pause-strip" class="v2-pause"></div>
      <div id="v2-listen-for" class="v2-listen"></div>
      <div id="v2-branch-preview" class="v2-next"></div>
      <div id="v2-do-not" class="v2-donot" style="display:none"></div>
    </div>
    <div class="side-panel objections-panel" id="objectionsPanel">
      <!-- v2 right rail: tactical support card -->
      <div id="v2-tactical-card" class="v2-tactical">
        <div id="v2-tac-ask" class="v2-tac-section"></div>
        <div id="v2-tac-rebuttal" class="v2-tac-section"></div>
        <div id="v2-tac-value" class="v2-tac-section"></div>
        <div id="v2-tac-proof" class="v2-tac-section"></div>
        <div id="v2-tac-ifthen" class="v2-tac-section"></div>
      </div>
      <div class="side-panel-header">OBJECTIONS</div>
      <div class="side-panel-feed" id="objectionsFeed"></div>
    </div>
  </div>

  <!-- Hotkey legend -->
  <div id="quick-pick-strip" class="quick-pick-strip"></div>
  <div id="bridge-hotkey-bar" class="hotkey-bar bridge-hotkey-bar"></div>
  <div id="objection-hotkey-bar" class="hotkey-bar objection-hotkey-bar"></div>
  <div id="hotkey-bar" class="hotkey-bar"></div>

  <script type="module" src="./ui.js"></script>
</body>
</html>
