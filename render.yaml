services:
  - type: web
    name: calllock-harness
    runtime: python
    rootDir: harness
    buildCommand: pip install -e .
    startCommand: uvicorn harness.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: HARNESS_EVENT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LITELLM_BASE_URL
        sync: false
      - key: RETELL_API_KEY
        sync: false
      - key: VOICE_CREDENTIAL_KEY
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
  - type: web
    name: calllock-inngest
    runtime: node
    rootDir: inngest
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: HARNESS_BASE_URL
        sync: false
      - key: HARNESS_EVENT_SECRET
        sync: false
      - key: INNGEST_EVENT_KEY
        sync: false
      - key: INNGEST_SIGNING_KEY
        sync: false
  - type: web
    name: calllock-litellm
    runtime: docker
    rootDir: infra/litellm
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
  - type: web
    name: calllock-app
    runtime: node
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
  - type: redis
    name: calllock-redis
    ipAllowList: []
