      urgency_tier: "emergency"
      caller_type: "residential"
      primary_intent: "solicitation"
      hvac_issue_type: "Odor"
      safety_emergency: true
      appointment_booked: false
      route: "vendor"
      tags:
        - "GAS_LEAK"
        - "CRITICAL_EVACUATE"
        - "UTILITY_COMPANY"
    expected_revenue_tier: "standard_repair"

