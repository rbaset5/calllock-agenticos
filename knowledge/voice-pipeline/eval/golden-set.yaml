version: "1.0"
description: "Golden evaluation set for HVAC voice pipeline"
calls:
  - id: "eval-001"
    description: "Standard AC repair, residential, urgent"
    transcript: |
      Agent: Thank you for calling ABC Heating and Cooling.
      User: My name is John Smith.
      Agent: What address do you need service at?
      User: 123 Oak Street, Austin, TX 78701.
      User: My AC is not cooling and it's been blowing warm air since this morning.
      Agent: Is the outdoor unit running?
      User: Yes, but it's making a strange noise and the house is 95 degrees.
      Agent: Any smoke or gas smell?
      User: No, just really hot.
      Agent: We'll have a technician call you back as soon as possible.
    raw_payload:
      call_summary: "Customer reports AC not cooling."
      start_timestamp: 1718452800000
      retell_llm_dynamic_variables:
        problem_description: "AC not cooling"
        urgency_tier: "urgent"
        booking_confirmed: "false"
    expected_fields:
      customer_name: "John Smith"
      service_address: "123 Oak Street, Austin, TX 78701"
      urgency_tier: "urgent"
      caller_type: "residential"
      primary_intent: "service"
      hvac_issue_type: "No Cool"
      safety_emergency: false
      appointment_booked: false
      route: "legitimate"
      tags:
        - "URGENT_24HR"
        - "REPAIR_AC"
        - "DURATION_ACUTE"
    expected_revenue_tier: "major_repair"

