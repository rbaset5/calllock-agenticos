      Agent: Please leave the house immediately if you think there is a leak.
      User: We are outside now.
      Agent: What address are you calling from?
      User: 88 Pine Avenue, Dallas, TX 75001.
      Agent: I am marking this as an emergency and advising you to call the gas company.
      User: Thank you.
      Agent: Do not go back inside until it is safe.
    raw_payload:
      call_summary: "Caller reports gas smell by furnace."
      start_timestamp: 1735776000000
      retell_llm_dynamic_variables:
        problem_description: "gas smell near furnace"
        urgency_tier: "emergency"
    expected_fields:
      customer_name: "Maria Lopez"
