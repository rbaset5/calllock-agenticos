    interruption_sensitivity: 0.7
    name: booking
    state_prompt: '## State: BOOKING


      The caller has CONFIRMED their information. Now find available times and book.


      IMPORTANT: You have NO end_call tool. You can ONLY route to [done] (success)
      or [callback] (failure).


      ## TWO-STEP FLOW (MANDATORY)


      ### Step 1: Call check_availability

      Your FIRST action MUST be calling check_availability with check_only=true.

      Do NOT generate any text before calling the tool — the execution_message handles
      speech.


      Pass these values:

      - customer_name: The caller''s name

      - customer_phone: "auto"

      - service_address: Their address or "TBD"

      - preferred_time: EXACTLY what they said

      - issue_description: Their problem description. If site_contact_name exists,
      append: " | Site contact: [name] at [phone]"

      - urgency_tier: "urgent" or "routine"

      - check_only: true (ALWAYS)


      ### Step 2: Present times and get confirmation

      When check_availability returns:

      - If available_slots has options: Read them aloud. "I''ve got [slot 1], [slot
      2], or [slot 3]. Which works best?"

      - If booked is false and no available_slots: Route to [callback] — "Let me have
      someone call you back to find a time."

      - WAIT for the caller to pick a time. Do NOT proceed until they confirm.


      ### Step 3: Call book_service with their confirmed slot

      ONLY after the caller says yes to a specific time:

      - Call book_service with the same parameters, but set preferred_time to the
      EXACT time the caller confirmed (e.g., ''Friday March 20 at 9:00 AM'')

      - Do NOT pass check_only

      - The execution_message "Locking that in for you now..." handles speech


      ### Step 4: Confirm the booking

      When book_service returns with booked: true:

      - Read back: "[appointment_date] at [appointment_time]. Tech will call 30 minutes
      before."

      - Route to [done]


      If book_service returns booked: false:

      - Route to [callback]


      ### If the caller changes their mind

      If the caller says "actually, what about morning?" or picks a different time:

      - Call check_availability again with their new preference

      - Repeat from Step 2


      ### If caller wants to cancel existing + rebook

      If check_availability mentions an existing appointment:

      - Ask: "Would you like to keep that one, or reschedule?"

      - If reschedule: call book_service with force_book=true


      CRITICAL RULES:

      - NEVER call book_service before check_availability

      - NEVER tell the caller they''re booked before book_service returns booked:
      true

      - NEVER skip the caller confirmation step between check and book'
    tools:
    - args_at_root: false
      description: Checks available appointment slots WITHOUT booking. Returns a list
        of available times for the caller to choose from.
      execution_message: Let me check what we've got open...
      headers: {}
      method: POST
      name: check_availability
      parameter_type: json
      parameters:
        properties:
          check_only:
            description: ALWAYS pass true. This checks availability without booking.
            type: boolean
          customer_name:
            description: Customer's name
            type: string
          customer_phone:
            description: Pass 'auto' — backend uses caller ID automatically
            type: string
          issue_description:
            description: The HVAC problem described by the caller.
            type: string
          preferred_time:
            description: 'When they want service: ''soonest available'', ''tomorrow
              morning'', ''Monday at 2pm'', etc.'
            type: string
          service_address:
            description: Service address or 'TBD'
            type: string
          urgency_tier:
            description: 'Urgency level: ''urgent'' or ''routine'''
            type: string
        required:
        - customer_name
        - customer_phone
        - preferred_time
        - issue_description
        - check_only
        type: object
      query_params: {}
      response_variables: {}
      speak_after_execution: true
      speak_during_execution: true
      timeout_ms: 15000
      type: custom
      url: https://app.calllock.co/api/retell/book-service
