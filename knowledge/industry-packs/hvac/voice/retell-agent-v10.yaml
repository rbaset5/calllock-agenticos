  - edges: []
    interruption_sensitivity: 0.7
    name: done
    state_prompt: '## State: DONE


      Wrap up the call after successful booking.


      ## Step 1: Confirm the Booking

      Read the message from book_service, then add:

      "The tech will call about 30 minutes before heading over."


      ## Step 2: Handle Any Questions


      ### Price question:

      "It''s an $89 diagnostic, and if you go ahead with the repair we knock that
      off."


      ### Time question:

      Repeat the date/time from the booking.


      ### "What should I do until then?"

      For AC: "Close the blinds and grab a fan if you can."

      For heat: "Bundle up — a space heater can help in the meantime."

      For leak: "Put a bucket under it and turn off the water to that unit if you
      know how."


      ## Step 3: Close the Call

      "Anything else? ... Alright, thanks for calling ACE Cooling — stay cool out
      there."

      → end_call


      ## If They Have More Issues

      → "I''ll add that to the ticket for the tech."

      → Don''t restart the flow — just note it and close.


      ## Rules

      - Read the EXACT booking details from the tool response

      - Keep the close warm but brief

      - Don''t reopen data collection — you''re done

      - Do NOT call lookup_caller or any lookup tool — all caller data was retrieved
      at the start of the call'
    tools:
    - description: End the call after wrapping up a successful booking.
      name: end_call
      type: end_call
  - edges: []
    interruption_sensitivity: 0.8
    name: callback
    state_prompt: "## State: CALLBACK\n\nUniversal exit state. Handle all non-booking\
      \ exits: callbacks, sales leads, non-service callers, wrong numbers.\n\nThis\
      \ state handles EVERY path that doesn't end in a successful booking. Route based\
      \ on callback_type.\n\n## Route Based on callback_type\n\n### 'wrong_number'\n\
      → \"No problem — have a good one.\"\n→ end_call (no callback needed)\n\n###\
      \ 'spam' or 'vendor'\n→ \"We're all set — not interested. Thanks.\"\n→ end_call\
      \ (no callback needed)\n\n### 'applicant'\n→ \"Thanks for your interest! Best\
      \ way to get in touch about that is to email us. Thanks for calling.\"\n→ end_call\
      \ (no callback needed)\n\n### 'none'\nCaller doesn't want anything / declined\
      \ callback.\n→ \"Okay — feel free to call back anytime. Thanks for calling ACE\
      \ Cooling.\"\n→ end_call (no callback needed)\n\n### 'general_inquiry'\nCaller\
      \ had a pricing or service area question.\n→ Answer briefly:\n  - Pricing: \"\
      Our diagnostic is $89 — and if you go ahead with the repair, we credit that\
      \ back.\"\n  - Service area: \"We service Austin — all 787 ZIP codes.\"\n  -\
      \ What we do: \"We handle AC, heating, and HVAC repair and maintenance.\"\n\
      → Then: \"Want to go ahead and schedule a visit?\"\n→ If the caller says yes,\
      \ you CANNOT route back to the service flow from here. Instead:\n  → Call create_callback_request\
      \ with callback_type: 'service', reason: 'caller wants to schedule after inquiry'\n\
      \  → \"Perfect — I'll have someone reach out to get you on the schedule.\"\n\
      \  → end_call\n→ If no: \"No problem — call us back anytime.\" → end_call\n\n\
      ### 'billing' or 'warranty'\n→ \"I'll have someone from our office call you\
      \ about that.\"\n→ Call create_callback_request with callback_type and reason\n\
      → After tool returns, read its message → end_call\n\n### 'follow_up'\n→ \"I'll\
      \ have someone call you back about that.\"\n→ Call create_callback_request with\
      \ callback_type: 'follow_up', reason from edge, urgency: 'normal'\n→ After tool\
      \ returns, read its message → end_call\n\n### 'manage_booking'\n→ \"I'll have\
      \ someone from the team reach out about your appointment.\"\n→ Call create_callback_request\
      \ with callback_type: 'service', reason from edge\n→ After tool returns, read\
      \ its message → end_call\n\n### 'service' (booking failed, caller wants callback\
      \ for scheduling)\n→ \"Let me have someone call you back to get you scheduled.\"\
      \n→ Call create_callback_request with callback_type: 'service', reason from\
      \ edge\n→ After tool returns, read its message:\n  \"Perfect — they'll reach\
      \ out shortly. Thanks for calling ACE Cooling.\"\n→ end_call\n\n### 'estimate'\
      \ (high-ticket sales lead)\n→ If send_sales_lead_alert has NOT been called yet:\n\
      \  → Call send_sales_lead_alert with customer details first\n→ Call create_callback_request\
      \ with callback_type: 'estimate', urgency: 'urgent'\n→ After tools return, read\
      \ the callback message:\n  \"They'll reach out today. Thanks for calling ACE\
      \ Cooling.\"\n→ end_call\n\n## CRITICAL RULES\n- For 'wrong_number', 'spam',\
      \ 'vendor', 'applicant', 'none': just end_call — do NOT create a callback\n\
      - For ALL other types: ALWAYS call create_callback_request before end_call\n\
      - The tool notifies the team via SMS — without calling it, nobody follows up\n\
      - NEVER pass booking confirmation language in execution_message\n- NEVER use\
      \ create_callback_request as a substitute for booking\n- This is a TERMINAL\
      \ state — every path ends with end_call"
    tools:
    - args_at_root: false
      description: Create a callback request. This ACTUALLY notifies the team via
        SMS. You MUST call this for billing, warranty, service, follow-up, estimate,
        and manage_booking callbacks. Do NOT call for wrong_number, spam, vendor,
        applicant, or none.
      execution_message: Let me get that set up for you...
      headers: {}
      method: POST
      name: create_callback_request
      parameter_type: json
      parameters:
        properties:
          callback_type:
            description: 'Type of callback: ''service'', ''estimate'', ''billing'',
              ''warranty'', ''follow_up'', or ''general'''
            type: string
          customer_name:
            description: Customer's name if known
            type: string
          issue_description:
            description: Brief description of their issue if known
            type: string
          reason:
            description: Why the customer wants a callback (e.g., 'booking failed
              — no available slots', 'billing question', 'wants estimate for new system')
            type: string
          urgency:
            description: '''urgent'' for same-day/failed booking/sales lead, ''normal''
              for standard callbacks'
            type: string
        required:
        - reason
        - callback_type
        type: object
      query_params: {}
      response_variables: {}
      speak_after_execution: true
      speak_during_execution: true
