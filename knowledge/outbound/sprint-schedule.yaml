# 7-week progressive cold calling sprint schedule.
# Read by daily_plan.py to generate timezone-aware sprint plans.
# Each sprint = 20 min. Recovery = 5 min between sprints.

start_date: "2026-03-30"
deadline: "2026-05-16"
sprint_duration_min: 20
recovery_min: 5
dials_per_sprint: 10

metro_timezones:
  FL: "America/New_York"
  GA: "America/New_York"
  NC: "America/New_York"
  MI: "America/Detroit"
  OH: "America/New_York"
  TX: "America/Chicago"
  IL: "America/Chicago"
  AZ: "America/Phoenix"

# Callback follow-up cadence for sprint calls.
# Lifecycle sweep uses these intervals to re-queue overdue callbacks.
# See: decisions/product/DEC-2026-04-04-sms-postponed.md
callback_cadence:
  max_attempts: 3
  attempts:
    1:
      delay_days: 1          # next business day after initial call
      block: MID
      action_on_no_answer: "voicemail + set next_action_date"
    2:
      delay_days: 1          # +1 business day after attempt 1
      block: MID
      action_on_no_answer: "second voicemail + set next_action_date"
    3:
      delay_days: 2          # +2 business days after attempt 2
      block: EOD
      action_on_no_answer: "final attempt at different time-of-day"
  after_max_attempts: "disqualify_unreachable"  # lifecycle Rule 2 handles this
  queue_priority: "callbacks_due_today > warm_leads > fresh_dials"

weeks:
  1:
    days: weekdays
    daily_targets: [2, 3, 3, 4, 4]
    coaching_note: "2 sprints on day 1. Build rhythm before adding volume."
    phase: 1
    weekly_goal: "Habit first: show up, execute the ritual, and log every outcome."
    shutdown_fields: ["dials", "connects", "best_moment", "worst_moment"]
    blocks:
      AM:
        start_et: "07:20"
        sprints:
          - { metro: SE, note: "Southeast opens. FL/GA/NC." }
          - { metro: SE, note: "Second SE sprint." }
          - { metro: MW, note: "Midwest opens. MI/OH/IL." }
          - { metro: AZ, note: "AZ sweet spot." }

  2:
    days: weekdays
    daily_targets: [3, 4, 4, 5, 5]
    coaching_note: "Keep opener consistent and measure hook hold-time."
    phase: 1
    weekly_goal: "Stabilize daily output and protect quality at higher pace."
    shutdown_fields: ["dials", "connects", "top_objection", "script_tweak"]
    blocks:
      AM:
        start_et: "07:20"
        sprints:
          - { metro: SE, note: "Updated opener from Week 1 signal." }
          - { metro: SE, note: "Notice if the update changes how long they stay on." }
          - { metro: SE, note: "Mid-AM check: are you asking for the demo?" }
          - { metro: MW, note: "Midwest sprint. MI/OH/IL." }
          - { metro: TX, note: "TX. New territory. Finish clean." }

  3:
    days: weekdays
    daily_targets: [4, 5, 5, 6, 6]
    coaching_note: "Commit to asking for the next step on every live conversation."
    phase: 2
    weekly_goal: "Scale volume while keeping conversion discipline."
    shutdown_fields: ["dials", "connects", "demos", "callback_quality"]
    blocks:
      AM:
        start_et: "07:20"
        sprints:
          - { metro: SE, note: "Pitch is sharp now. Make the ask on every live conversation." }
          - { metro: SE, note: "SE segment. Stay on pace." }
          - { metro: SE, note: "SE complete. MW auto-loads." }
          - { metro: MW, note: "Midwest opens." }
          - { metro: MW, note: "MW segment. Notice objection differences by market." }
          - { metro: TX, note: "TX segment." }
          - { metro: AZ, note: "AZ. Best connect window of the AM." }
      MID:
        start_et: "13:00"
        sprints:
          - { metro: callbacks, note: "AZ and TX voicemails from AM. Higher intent." }
          - { metro: callbacks, note: "Fresh dials mixed with callbacks." }

  4:
    days: weekdays_saturday
    daily_targets: [5, 6, 6, 7, 7, 4]
    coaching_note: "Saturday is a tactical edge day. Keep scripts tight and focused."
    phase: 2
    weekly_goal: "Exploit timezone windows and convert warm pockets fast."
    shutdown_fields: ["dials", "connects", "demos", "best_slot", "worst_slot"]
    blocks:
      AM:
        start_et: "07:20"
        sprints:
          - { metro: SE, note: "SE opens." }
          - { metro: SE, note: "SE second sprint." }
          - { metro: SE, note: "SE complete. MW loads." }
          - { metro: MW, note: "Midwest opens." }
          - { metro: MW, note: "MW second sprint." }
          - { metro: TX, note: "TX opens. Central time." }
          - { metro: TX, note: "TX second sprint." }
          - { metro: AZ, note: "AZ sweet spot. Highest connect rate." }
          - { metro: AZ, note: "AZ second sprint." }
      MID:
        start_et: "13:00"
        sprints:
          - { metro: hot_leads, note: "Warmest leads first. Most likely closes." }
          - { metro: warm_callbacks, note: "Warm leads who engaged but haven't committed." }
          - { metro: fresh, note: "Fresh dials on new leads. Keep the volume up." }
      EOD:
        start_et: "16:00"
        sprints:
          - { metro: AZ, note: "AZ at 1 PM local. Jobs wrapping. Best pickup rate." }
          - { metro: AZ, note: "Second EOD sprint. Fresh AZ dials plus remaining callbacks." }

  5:
    days: weekdays_saturday
    daily_targets: [6, 7, 7, 8, 8, 5]
    coaching_note: "Run disciplined block transitions. No dead time between sprints."
    phase: 3
    weekly_goal: "Maximize consistency across all blocks and protect energy." 
    shutdown_fields: ["dials", "connects", "close_attempts", "fatigue_score"]
    dials_per_sprint: 12
    blocks:
      AM:
        start_et: "07:20"
        sprints:
          - { metro: SE }
          - { metro: SE }
          - { metro: SE }
          - { metro: MW }
          - { metro: MW }
          - { metro: TX }
          - { metro: TX }
          - { metro: AZ }
          - { metro: AZ }
      MID:
        start_et: "13:00"
        sprints:
          - { metro: callbacks }
          - { metro: warm_callbacks }
      EOD:
        start_et: "16:00"
        sprints:
          - { metro: AZ }
          - { metro: AZ }

  6:
    days: weekdays_saturday
    daily_targets: [7, 8, 8, 9, 9, 6]
    dials_per_sprint: 13
    coaching_note: "Quality under pressure: keep notes crisp and next steps explicit."
    phase: 3
    weekly_goal: "Push throughput while maintaining close intent and follow-through."
    shutdown_fields: ["dials", "connects", "close_attempts", "next_steps_set"]
    blocks:
      AM:
        start_et: "07:20"
        sprints:
          - { metro: SE }
          - { metro: SE }
          - { metro: SE }
          - { metro: MW }
          - { metro: MW }
          - { metro: TX }
          - { metro: TX }
          - { metro: AZ }
          - { metro: AZ }
      MID:
        start_et: "13:00"
        sprints:
          - { metro: callbacks }
          - { metro: warm_callbacks }
      EOD:
        start_et: "16:00"
        sprints:
          - { metro: AZ }
          - { metro: AZ }

  7:
    days: weekdays_saturday
    daily_targets: [8, 9, 9, 10, 10, 7]
    dials_per_sprint: 14
    coaching_note: "Finish strong: prioritize hot/warm follow-through and clean closes."
    phase: 3
    weekly_goal: "Convert pipeline volume into demos and signed customers before deadline."
    shutdown_fields: ["dials", "connects", "demos", "customers_signed", "one_change_tomorrow"]
    blocks:
      AM:
        start_et: "07:20"
        sprints:
          - { metro: SE }
          - { metro: SE }
          - { metro: SE }
          - { metro: MW }
          - { metro: MW }
          - { metro: TX }
          - { metro: TX }
          - { metro: AZ }
          - { metro: AZ }
      MID:
        start_et: "13:00"
        sprints:
          - { metro: hot_leads, note: "Hot leads first." }
          - { metro: callbacks }
          - { metro: warm_callbacks }
      EOD:
        start_et: "16:00"
        sprints:
          - { metro: AZ }
          - { metro: AZ }
      LATE:
        start_et: "17:00"
        sprints:
          - { metro: AZ, note: "AZ afternoon. Final push." }
          - { metro: callbacks, note: "End-of-day callback sweep." }
