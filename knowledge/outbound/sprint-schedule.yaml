# 7-week progressive cold calling sprint schedule.
# Read by daily_plan.py to generate timezone-aware sprint plans.
# Each sprint = 20 min. Recovery = 5 min between sprints.

start_date: "2026-03-30"
deadline: "2026-05-16"
sprint_duration_min: 20
recovery_min: 5
dials_per_sprint: 10

metro_timezones:
  FL: "America/New_York"
  TX: "America/Chicago"
  IL: "America/Chicago"
  AZ: "America/Phoenix"

weeks:
  1:
    days: weekdays
    daily_targets: [2, 3, 3, 4, 4]
    coaching_note: "2 sprints on day 1. Build rhythm before adding volume."
    phase: 1
    weekly_goal: "Habit first: show up, execute the ritual, and log every outcome."
    shutdown_fields: ["dials", "connects", "best_moment", "worst_moment"]
    blocks:
      AM:
        start_et: "07:20"
        sprints:
          - { metro: FL, note: "Opening week. Test the pitch." }
          - { metro: FL, note: "Second sprint. Stay on pace." }
          - { metro: TX, note: "TX opens. Central time." }
          - { metro: AZ, note: "AZ sweet spot." }

  2:
    days: weekdays
    daily_targets: [3, 4, 4, 5, 5]
    coaching_note: "Keep opener consistent and measure hook hold-time."
    phase: 1
    weekly_goal: "Stabilize daily output and protect quality at higher pace."
    shutdown_fields: ["dials", "connects", "top_objection", "script_tweak"]
    blocks:
      AM:
        start_et: "07:20"
        sprints:
          - { metro: FL, note: "Updated opener from Week 1 signal." }
          - { metro: FL, note: "Notice if the update changes how long they stay on." }
          - { metro: FL, note: "Mid-AM check: are you asking for the demo?" }
          - { metro: TX_IL, note: "Fourth sprint. You passed last week's limit." }
          - { metro: TX_IL, note: "Fifth sprint. New territory. Finish clean." }

  3:
    days: weekdays
    daily_targets: [4, 5, 5, 6, 6]
    coaching_note: "Commit to asking for the next step on every live conversation."
    phase: 2
    weekly_goal: "Scale volume while keeping conversion discipline."
    shutdown_fields: ["dials", "connects", "demos", "callback_quality"]
    blocks:
      AM:
        start_et: "07:20"
        sprints:
          - { metro: FL, note: "Pitch is sharp now. Make the ask on every live conversation." }
          - { metro: FL, note: "FL segment. Stay on pace." }
          - { metro: FL, note: "FL complete after this sprint. TX list auto-loads." }
          - { metro: TX, note: "TX opens. Central time. Same quality window." }
          - { metro: TX_IL, note: "TX / IL segment. Notice objection differences by market." }
          - { metro: IL, note: "IL segment. Chicago market." }
          - { metro: IL, note: "IL complete. AZ loads. Best connect window of the AM." }
      MID:
        start_et: "13:00"
        sprints:
          - { metro: callbacks, note: "AZ and TX voicemails from AM. Higher intent." }
          - { metro: callbacks, note: "Fresh dials mixed with callbacks." }

  4:
    days: weekdays_saturday
    daily_targets: [5, 6, 6, 7, 7, 4]
    coaching_note: "Saturday is a tactical edge day. Keep scripts tight and focused."
    phase: 2
    weekly_goal: "Exploit timezone windows and convert warm pockets fast."
    shutdown_fields: ["dials", "connects", "demos", "best_slot", "worst_slot"]
    blocks:
      AM:
        start_et: "07:20"
        sprints:
          - { metro: FL, note: "FL opens." }
          - { metro: FL, note: "FL second sprint." }
          - { metro: FL, note: "FL complete. TX list auto-loads." }
          - { metro: TX, note: "TX opens. Central time." }
          - { metro: TX, note: "TX second sprint." }
          - { metro: IL, note: "IL opens. Chicago market." }
          - { metro: IL, note: "IL complete. AZ loads. Best connect window." }
          - { metro: AZ, note: "AZ sweet spot. Highest connect rate." }
          - { metro: AZ, note: "AZ second sprint." }
      MID:
        start_et: "13:00"
        sprints:
          - { metro: hot_leads, note: "Warmest leads first. Most likely closes." }
          - { metro: warm_callbacks, note: "Warm leads who engaged but haven't committed." }
          - { metro: fresh, note: "Fresh dials on new leads. Keep the volume up." }
      EOD:
        start_et: "16:00"
        sprints:
          - { metro: AZ, note: "AZ at 1 PM local. Jobs wrapping. Best pickup rate." }
          - { metro: AZ, note: "Second EOD sprint. Fresh AZ dials plus remaining callbacks." }

  5:
    days: weekdays_saturday
    daily_targets: [6, 7, 7, 8, 8, 5]
    coaching_note: "Run disciplined block transitions. No dead time between sprints."
    phase: 3
    weekly_goal: "Maximize consistency across all blocks and protect energy." 
    shutdown_fields: ["dials", "connects", "close_attempts", "fatigue_score"]
    blocks:
      AM:
        start_et: "07:20"
        sprints:
          - { metro: FL }
          - { metro: FL }
          - { metro: FL }
          - { metro: TX }
          - { metro: TX }
          - { metro: IL }
          - { metro: IL }
          - { metro: AZ }
          - { metro: AZ }
      MID:
        start_et: "13:00"
        sprints:
          - { metro: callbacks }
          - { metro: warm_callbacks }
      EOD:
        start_et: "16:00"
        sprints:
          - { metro: AZ }
          - { metro: AZ }

  6:
    days: weekdays_saturday
    daily_targets: [7, 8, 8, 9, 9, 6]
    dials_per_sprint: 11
    coaching_note: "Quality under pressure: keep notes crisp and next steps explicit."
    phase: 3
    weekly_goal: "Push throughput while maintaining close intent and follow-through."
    shutdown_fields: ["dials", "connects", "close_attempts", "next_steps_set"]
    blocks:
      AM:
        start_et: "07:20"
        sprints:
          - { metro: FL }
          - { metro: FL }
          - { metro: FL }
          - { metro: TX }
          - { metro: TX }
          - { metro: IL }
          - { metro: IL }
          - { metro: AZ }
          - { metro: AZ }
      MID:
        start_et: "13:00"
        sprints:
          - { metro: callbacks }
          - { metro: warm_callbacks }
      EOD:
        start_et: "16:00"
        sprints:
          - { metro: AZ }
          - { metro: AZ }

  7:
    days: weekdays_saturday
    daily_targets: [8, 9, 9, 10, 10, 7]
    dials_per_sprint: 11
    coaching_note: "Finish strong: prioritize hot/warm follow-through and clean closes."
    phase: 3
    weekly_goal: "Convert pipeline volume into demos and signed customers before deadline."
    shutdown_fields: ["dials", "connects", "demos", "customers_signed", "one_change_tomorrow"]
    blocks:
      AM:
        start_et: "07:20"
        sprints:
          - { metro: FL }
          - { metro: FL }
          - { metro: FL }
          - { metro: TX }
          - { metro: TX }
          - { metro: IL }
          - { metro: IL }
          - { metro: AZ }
          - { metro: AZ }
      MID:
        start_et: "13:00"
        sprints:
          - { metro: hot_leads, note: "Hot leads first." }
          - { metro: callbacks }
          - { metro: warm_callbacks }
      EOD:
        start_et: "16:00"
        sprints:
          - { metro: AZ }
          - { metro: AZ }
