# Reply Classifier Evaluation Fixtures
# Companion to: Sales Machine Operating Manual Section 2.5.6
#
# Usage: Run Reply Classifier agent against all fixtures on every prompt change.
# Minimum accuracy thresholds:
#   - Overall: 90%
#   - unsubscribe category: 95% (CAN-SPAM legal requirement)
#   - positive_interest category: 90% (revenue-critical)
#   - All other categories: 85%
#
# Structure: 5 examples per category x 9 categories = 45 test cases
# Replace synthetic examples with real replies as they accumulate.

fixtures:

  # ─────────────────────────────────────────────
  # POSITIVE_INTEREST (5 examples)
  # These MUST trigger handoff to founder pipeline
  # ─────────────────────────────────────────────
  - id: pi-1
    reply_text: "This looks interesting, how does it work with our ServiceTitan dispatch?"
    expected_category: positive_interest
    expected_conviction: up
    expected_readiness: up
    notes: "Classic interest + specific integration question. High confidence expected."

  - id: pi-2
    reply_text: "Yeah we miss a ton of calls after hours. What does this cost?"
    expected_category: positive_interest
    expected_conviction: up
    expected_readiness: up
    notes: "Pain acknowledgment + pricing ask = strong buying signal."

  - id: pi-3
    reply_text: "Can you give me a call this week? Want to learn more."
    expected_category: positive_interest
    expected_conviction: up
    expected_readiness: up
    notes: "Explicit request for contact. Highest-confidence positive signal."

  - id: pi-4
    reply_text: "Interesting. We just lost a $3k job because nobody picked up the phone Saturday."
    expected_category: positive_interest
    expected_conviction: up
    expected_readiness: up
    notes: "Shares specific pain story = highly engaged. Even without explicit ask."

  - id: pi-5
    reply_text: "Ok I looked at the calculator. Those numbers seem about right for us. What's next?"
    expected_category: positive_interest
    expected_conviction: up
    expected_readiness: up
    notes: "Engaged with proof asset + asks for next step. Strong pipeline signal."

