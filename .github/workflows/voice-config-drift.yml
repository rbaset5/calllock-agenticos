name: Voice Config Drift

on:
  pull_request:
    paths:
      - "knowledge/industry-packs/hvac/voice/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  voice-config-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install httpx pyyaml

      - id: drift
        env:
          RETELL_API_KEY: ${{ secrets.RETELL_API_KEY }}
          RETELL_LLM_ID: ${{ secrets.RETELL_LLM_ID }}
        run: |
          set +e
          output="$(python scripts/deploy-retell-agent.py --llm-id "$RETELL_LLM_ID" --diff-only 2>&1)"
          exit_code=$?
          set -e

          {
            echo "exit_code=$exit_code"
            echo "diff<<EOF"
            printf '%s\n' "$output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$exit_code" -gt 1 ]; then
            printf '%s\n' "$output"
            exit "$exit_code"
          fi

      - uses: actions/github-script@v7
        if: steps.drift.outputs.exit_code == '1'
        env:
          DIFF_OUTPUT: ${{ steps.drift.outputs.diff }}
        with:
          script: |
            const body = [
              "Voice config drift detected by `scripts/deploy-retell-agent.py --diff-only`.",
              "",
              "```diff",
              process.env.DIFF_OUTPUT || "",
              "```",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
